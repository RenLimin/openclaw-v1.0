# =============================================================================
# 关键信息提取增强规则配置
# =============================================================================
# 针对合同场景，增强甲方/乙方、合同金额、税率、付款方式等关键信息提取
# 包含多模式冗余匹配 + 公章干扰清理规则
# =============================================================================

version: '2.0'
updated: '2026-04-24'

# =============================================================================
# 全局配置
# =============================================================================
global_config:
  # 搜索范围：在文档前 N 字符内搜索关键信息
  search_max_chars: 8000
  # 清理后处理：对提取到的值进行二次清理
  post_cleanup: true
  # 跨行合并支持（对于跨两行的金额等信息）
  merge_across_lines: true
  # 公章干扰关键词列表（提取前先清理这些内容）
  seal_noise_keywords:
    - "Android应用"
    - "Android"
    - "AaB Re"
    - "AaB"
    - "BaA"
    - "覆盖"
    - "公章"
    - "签章"
    - "签字"
    - "签名"
    - "盖 章"
    - "签 字"
    - "签 名"
    - "法定代表人"
    - "授权代表"
    - "委托代理人"
    - "年 月 日"
    - "单位盖章"
    - "公司盖章"
    - "（盖章）"
    - "（签字）"
    - "（签章）"

# =============================================================================
# 甲方信息提取规则
# =============================================================================
party_a_rules:
  name: "甲方名称"
  description: "合同甲方/买方/需方/发包方/委托方名称提取"
  # 多模式冗余匹配（按优先级排序）
  patterns:
    - "甲方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "甲方[：:：\\s]*([^\\n\\r，；。,;]+股份公司)"
    - "甲方[：:：\\s]*([^\\n\\r，；。,;]+集团)"
    - "甲方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "买方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "买方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "需方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "需方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "发包方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "发包方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "委托方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "委托方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "甲方：\\s*([^\\n\\r]{4,50})"
    - "甲方\\(以下简称[^)]+\\)[：:：\\s]*([^\\n\\r，；。,;]+)"
  # 提取后清理规则
  cleanup_rules:
    - "去除首尾空白字符"
    - "去除公章干扰关键词"
    - "去除括号及内容（如：（盖章））"
    - "去除'（以下简称.*）'等描述"
  # 验证规则
  validation:
    min_length: 4
    max_length: 100
    must_contain: ["公司", "有限", "股份", "集团", "局", "院", "所", "中心", "大学"]

# =============================================================================
# 乙方信息提取规则
# =============================================================================
party_b_rules:
  name: "乙方名称"
  description: "合同乙方/卖方/供方/承包方/受托方名称提取"
  # 多模式冗余匹配（按优先级排序）
  patterns:
    - "乙方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "乙方[：:：\\s]*([^\\n\\r，；。,;]+股份公司)"
    - "乙方[：:：\\s]*([^\\n\\r，；。,;]+集团)"
    - "乙方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "卖方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "卖方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "供方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "供方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "承包方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "承包方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "受托方[：:：\\s]*([^\\n\\r，；。,;]+有限公司)"
    - "受托方[：:：\\s]*([^\\n\\r，；。,;]+公司)"
    - "乙方：\\s*([^\\n\\r]{4,50})"
    - "乙方\\(以下简称[^)]+\\)[：:：\\s]*([^\\n\\r，；。,;]+)"
  # 提取后清理规则
  cleanup_rules:
    - "去除首尾空白字符"
    - "去除公章干扰关键词"
    - "去除括号及内容（如：（盖章））"
    - "去除'（以下简称.*）'等描述"
  # 验证规则
  validation:
    min_length: 4
    max_length: 100
    must_contain: ["公司", "有限", "股份", "集团", "局", "院", "所", "中心", "大学"]

# =============================================================================
# 合同金额提取规则
# =============================================================================
amount_rules:
  name: "合同金额"
  description: "合同总价/金额提取（支持跨行合并）"
  # 多模式冗余匹配（按优先级排序）
  patterns:
    - "合同金额[：:：\\s]*人民币([\\d,，.]+元)"
    - "合同金额[：:：\\s]*([\\d,，.]+元)"
    - "合同总价[：:：\\s]*人民币([\\d,，.]+元)"
    - "合同总价[：:：\\s]*([\\d,，.]+元)"
    - "总价[：:：\\s]*人民币([\\d,，.]+元)"
    - "总价[：:：\\s]*([\\d,，.]+元)"
    - "金额[：:：\\s]*人民币([\\d,，.]+元)"
    - "金额[：:：\\s]*([\\d,，.]+元)"
    - "人民币([\\d,，.]+元整)"
    - "人民币([\\d,，.]+万元整)"
    - "人民币([\\d,，.]+万元)"
    - "大写金额[：:：\\s]*([^\\n\\r]+元整)"
    - "大写：[：:：\\s]*([^\\n\\r]+元整)"
    - "（大写）[：:：\\s]*([^\\n\\r]+元整)"
  # 跨行合并支持模式
  cross_line_patterns:
    - "人民币\\s*\\n\\s*([\\d,，.]+元)"
    - "合同金额\\s*\\n\\s*([\\d,，.]+元)"
    - "总价\\s*\\n\\s*人民币\\s*\\n\\s*([\\d,，.]+元)"
  # 提取后清理规则
  cleanup_rules:
    - "去除金额中的空格"
    - "统一千位分隔符（中文逗号→英文逗号）"
    - "去除公章干扰关键词"
    - "去除多余的换行符"
  # 金额数字标准化
  normalization:
    convert_to_numeric: true
    standard_format: "￥{numeric} 元"
    keep_both_formats: true  # 同时保留大写和数字格式

# =============================================================================
# 税率提取规则
# =============================================================================
tax_rate_rules:
  name: "税率"
  description: "合同税率/增值税税率提取"
  patterns:
    - "税率[：:：\\s]*([\\d.]+%)"
    - "增值税税率[：:：\\s]*([\\d.]+%)"
    - "增值税[：:：\\s]*([\\d.]+%)"
    - "税率为[：:：\\s]*([\\d.]+%)"
    - "适用税率[：:：\\s]*([\\d.]+%)"
    - "([\\d.]+%)增值税"
    - "([\\d.]+%)税率"
  cleanup_rules:
    - "去除空格"
    - "标准化格式（如：13%）"
  validation:
    valid_rates: ["0%", "3%", "6%", "9%", "13%", "16%", "17%"]

# =============================================================================
# 付款方式提取规则
# =============================================================================
payment_method_rules:
  name: "付款方式"
  description: "合同付款方式/结算方式提取"
  patterns:
    - "付款方式[：:：\\s]*([^\\n\\r，；。]{5,50})"
    - "支付方式[：:：\\s]*([^\\n\\r，；。]{5,50})"
    - "结算方式[：:：\\s]*([^\\n\\r，；。]{5,50})"
    - "付款：[：:：\\s]*([^\\n\\r，；。]{5,50})"
  # 常见付款方式关键词（用于验证和分类）
  common_methods:
    - "银行转账"
    - "电汇"
    - "支票"
    - "汇票"
    - "承兑汇票"
    - "信用证"
    - "分期付款"
    - "一次性付款"
    - "货到付款"
    - "预付款"
    - "月结"
    - "季结"
    - "年结"
  cleanup_rules:
    - "去除首尾空白"
    - "去除多余标点"

# =============================================================================
# 交付地点提取规则
# =============================================================================
delivery_location_rules:
  name: "交付地点"
  description: "合同交货地点/交付地点提取"
  patterns:
    - "交付地点[：:：\\s]*([^\\n\\r，；。]{5,80})"
    - "交货地点[：:：\\s]*([^\\n\\r，；。]{5,80})"
    - "送货地点[：:：\\s]*([^\\n\\r，；。]{5,80})"
    - "收货地点[：:：\\s]*([^\\n\\r，；。]{5,80})"
    - "交货地[：:：\\s]*([^\\n\\r，；。]{5,80})"
  cleanup_rules:
    - "去除首尾空白"
    - "去除公章干扰关键词"

# =============================================================================
# 合同有效期提取规则
# =============================================================================
valid_period_rules:
  name: "合同有效期"
  description: "合同有效期/履行期限提取"
  patterns:
    - "有效期[：:：\\s]*自([^\\n\\r，；。]+)起?至([^\\n\\r，；。]+)止"
    - "合同期限[：:：\\s]*自([^\\n\\r，；。]+)起?至([^\\n\\r，；。]+)止"
    - "履行期限[：:：\\s]*自([^\\n\\r，；。]+)起?至([^\\n\\r，；。]+)止"
    - "本合同自([^\\n\\r，；。]+)起生效，至([^\\n\\r，；。]+)止"
    - "有效期[：:：\\s]*([^\\n\\r，；。]+年)"
    - "有效期[：:：\\s]*([^\\n\\r，；。]+个月)"
  cleanup_rules:
    - "标准化日期格式"
    - "去除多余空格"

# =============================================================================
# 签署日期提取规则
# =============================================================================
sign_date_rules:
  name: "签署日期"
  description: "合同签订日期/签署日期提取"
  patterns:
    - "签订日期[：:：\\s]*([\\d年月日\\-/.]+)"
    - "签署日期[：:：\\s]*([\\d年月日\\-/.]+)"
    - "签约日期[：:：\\s]*([\\d年月日\\-/.]+)"
    - "签订时间[：:：\\s]*([\\d年月日\\-/.]+)"
    - "本合同于([\\d年月日\\-/.]+)签订"
    - "([\\d]{4}年[\\d]{1,2}月[\\d]{1,2}日)"
  cleanup_rules:
    - "标准化日期格式（YYYY-MM-DD）"
    - "去除多余空格"

# =============================================================================
# 统一社会信用代码提取规则
# =============================================================================
credit_code_rules:
  name: "统一社会信用代码"
  description: "甲乙双方统一社会信用代码提取"
  patterns:
    - "统一社会信用代码[：:：\\s]*([A-Z0-9]{18})"
    - "信用代码[：:：\\s]*([A-Z0-9]{18})"
    - "统一社会信用代码：\\s*([^\\n\\r]{15,20})"
  cleanup_rules:
    - "去除所有空格"
    - "转换为大写"
  validation:
    length: 18
    format: "1位登记管理部门代码 + 1位机构类别代码 + 6位登记管理机关行政区划码 + 9位主体标识码 + 1位校验码"
