description: 民法典合同编-典型合同专项规则（TOP 8类高频合同）
version: '1.0'
updated: '2026-04-24'
coverage: 8类高频合同：借款/保证/租赁/承揽/建设工程/运输/技术/委托 + 软件合同
articles:
- id: LOAN-001
  name: 借款合同形式与内容
  category: 借款合同
  title: 借款合同应当采用书面形式，内容包括借款种类、币种、用途、数额、利率、期限和还款方式等
  original_text: 《民法典》第668条：借款合同应当采用书面形式，但是自然人之间借款另有约定的除外。借款合同的内容一般包括借款种类、币种、用途、数额、利率、期限和还款方式等条款。
  interpretation:
    core_principle: 借款合同为要式合同，必须书面，条款必须明确完整
    key_points:
    - 必须采用书面形式
    - 借款用途必须明确
    - 利率不得违反国家规定
    - 还款方式和期限必须具体
  contract_review_tips:
  - 禁止企业间无资质借贷
  - 借款用途必须具体，禁止笼统表述
  - 必须明确还本付息方式
  - 禁止预扣利息
  risk_level: 高
  keywords:
  - 借款合同
  - 书面形式
  - 借款用途
  - 借款金额
  - 利率
  - 还款方式
  - 借款期限
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第668条
- id: LOAN-002
  name: 借款利息禁止预扣
  category: 借款合同
  title: 借款的利息不得预先在本金中扣除，利息预先扣除的应当按照实际借款数额返还借款并计算利息
  original_text: 《民法典》第670条：借款的利息不得预先在本金中扣除。利息预先在本金中扣除的，应当按照实际借款数额返还借款并计算利息。
  interpretation:
    core_principle: 禁止砍头息，按实际出借金额计算本息
    key_points:
    - 禁止预扣利息
    - 预扣的按实际金额返还
    - 实际借款金额=名义金额-预扣利息
  contract_review_tips:
  - 仔细核对放款金额与合同金额是否一致
  - 利息只能按期支付，不得放款时直接扣除
  - 发现砍头息立即退回并重新计算
  risk_level: 高
  keywords:
  - 预扣利息
  - 砍头息
  - 实际借款金额
  - 利息预先扣除
  - 本金
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第670条
- id: LOAN-003
  name: 借款人未按约定用途使用借款的后果
  category: 借款合同
  title: 借款人未按照约定的借款用途使用借款的，贷款人可以停止发放借款、提前收回借款或者解除合同
  original_text: 《民法典》第673条：借款人未按照约定的借款用途使用借款的，贷款人可以停止发放借款、提前收回借款或者解除合同。
  interpretation:
    core_principle: 改变借款用途构成根本违约，出借人享有三项救济权利
    key_points:
    - 停止发放剩余借款
    - 提前收回已发放借款
    - 解除合同
  contract_review_tips:
  - 必须约定借款用途监控方式
  - 改变用途的要及时发送书面通知
  - 保留资金流向证据
  risk_level: 高
  keywords:
  - 借款用途
  - 改变用途
  - 提前收回借款
  - 解除合同
  - 停止发放
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第673条
- id: LOAN-004
  name: 民间借贷利率限制
  category: 借款合同
  title: 借款利率不得违反国家有关规定，禁止高利放贷
  original_text: 《民法典》第680条：禁止高利放贷，借款的利率不得违反国家有关规定。借款合同对支付利息没有约定的，视为没有利息。
  interpretation:
    core_principle: 禁止高利贷，LPR4倍为上限
    key_points:
    - 禁止高利放贷
    - 无约定视为无利息
    - 约定不得超过LPR的4倍
  contract_review_tips:
  - 利率不得超过合同成立时LPR的4倍
  - 逾期利息、违约金等总和也不得超过4倍LPR
  - 无利息约定的不得主张利息
  risk_level: 高
  keywords:
  - 高利贷
  - 利率上限
  - LPR
  - 4倍LPR
  - 利息约定
  - 高利放贷
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第680条
- id: GUAR-001
  name: 保证合同形式与从属性
  category: 保证合同
  title: 保证合同是主债权债务合同的从合同，主合同无效的保证合同无效，法律另有规定除外
  original_text: 《民法典》第682条：保证合同是主债权债务合同的从合同。主债权债务合同无效的，保证合同无效，但是法律另有规定的除外。
  interpretation:
    core_principle: 保证合同具有从属性，随主合同效力变化
    key_points:
    - 从合同性质
    - 主合同无效则保证合同无效
    - 保证人有过错的承担相应责任
  contract_review_tips:
  - 必须先审查主合同效力
  - 独立保函不适用从属性规则
  - 保证合同无效不意味着完全无责任
  risk_level: 高
  keywords:
  - 保证合同
  - 从合同
  - 主合同
  - 从属性
  - 合同无效
  - 独立保函
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第682条
- id: GUAR-002
  name: 保证方式推定规则
  category: 保证合同
  title: 当事人在保证合同中对保证方式没有约定或者约定不明确的，按照一般保证承担保证责任
  original_text: 《民法典》第686条：当事人在保证合同中对保证方式没有约定或者约定不明确的，按照一般保证承担保证责任。
  interpretation:
    core_principle: 无约定推定为一般保证（民法典重大修改：原推定连带）
    key_points:
    - 推定为一般保证
    - 一般保证人有先诉抗辩权
    - 必须书面明确约定为连带责任保证
  contract_review_tips:
  - 必须明确约定保证方式："连带责任保证"
  - 仅写"承担保证责任"推定为一般保证
  - 作为债权人必须明确约定连带责任
  risk_level: 高
  keywords:
  - 保证方式
  - 一般保证
  - 连带责任保证
  - 先诉抗辩权
  - 推定规则
  - 约定不明
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第686条
- id: GUAR-003
  name: 保证期间
  category: 保证合同
  title: 保证期间是确定保证人承担保证责任的期间，不发生中止、中断和延长，无约定为主债务履行期届满后6个月
  original_text: 《民法典》第692条：保证期间是确定保证人承担保证责任的期间，不发生中止、中断和延长。没有约定或者约定不明确的，保证期间为主债务履行期限届满之日起六个月。
  interpretation:
    core_principle: 保证期间为除斥期间，必须在期间内行使权利
    key_points:
    - 不发生中止中断延长
    - 无约定为6个月
    - 约定"保证责任至本息还清时止"视为约定不明，也是6个月
  contract_review_tips:
  - 建议约定保证期间为2年
  - 必须在保证期间内起诉或书面催收
  - 超过保证期间保证人免责
  risk_level: 高
  keywords:
  - 保证期间
  - 除斥期间
  - 六个月
  - 2年
  - 催收
  - 免责
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第692条
- id: GUAR-004
  name: 最高额保证
  category: 保证合同
  title: 最高额保证是对一定期间内连续发生的债权，在最高债权额限度内承担保证责任
  original_text: 《民法典》第690条：保证人与债权人可以协商订立最高额保证的合同，约定在最高债权额限度内就一定期间连续发生的债权提供保证。
  interpretation:
    core_principle: 最高额保证覆盖一定期间内多笔债权，总额不超上限
    key_points:
    - 覆盖多笔连续债权
    - 有最高债权限额
    - 有明确的债权确定期间
  contract_review_tips:
  - 必须明确最高债权限额
  - 必须明确债权确定期间
  - 决算日到后必须及时行使权利
  risk_level: 高
  keywords:
  - 最高额保证
  - 最高债权额
  - 连续债权
  - 债权确定期间
  - 决算日
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第690条
- id: LEASE-001
  name: 租赁合同主要内容
  category: 租赁合同
  title: 租赁合同内容包括租赁物名称、数量、用途、租赁期限、租金及其支付期限和方式、租赁物维修等条款
  original_text: 《民法典》第704条：租赁合同的内容一般包括租赁物的名称、数量、用途、租赁期限、租金及其支付期限和方式、租赁物维修等条款。
  interpretation:
    core_principle: 租赁合同条款必须完整，特别是租赁物和租金条款
    key_points:
    - 租赁物明确具体
    - 租赁期限不得超过20年
    - 租金金额和支付方式明确
    - 维修责任划分
  contract_review_tips:
  - 租赁物必须明确到可唯一识别
  - 租赁期限超过6个月必须书面
  - 必须明确物业/水电等费用承担方
  - 必须明确维修责任划分
  risk_level: 中
  keywords:
  - 租赁合同
  - 租赁物
  - 租赁期限
  - 租金
  - 维修责任
  - 20年上限
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第704条
- id: LEASE-002
  name: 承租人优先购买权
  category: 租赁合同
  title: 出租人出卖租赁房屋的，应当在出卖之前的合理期限内通知承租人，承租人享有以同等条件优先购买的权利
  original_text: 《民法典》第726条：出租人出卖租赁房屋的，应当在出卖之前的合理期限内通知承租人，承租人享有以同等条件优先购买的权利；但是，房屋按份共有人行使优先购买权或者出租人将房屋出卖给近亲属的除外。
  interpretation:
    core_principle: 承租人有优先购买权，但有两个例外
    key_points:
    - 同等条件下优先购买
    - 必须提前15天通知
    - 按份共有人和近亲属购买的例外
  contract_review_tips:
  - 作为出租人必须履行通知义务
  - 作为承租人必须在15天内明确表示购买
  - 注意两个例外情形
  risk_level: 中
  keywords:
  - 优先购买权
  - 同等条件
  - 15天通知期
  - 按份共有人
  - 近亲属
  - 房屋租赁
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第726条
- id: LEASE-003
  name: 买卖不破租赁
  category: 租赁合同
  title: 租赁物在承租人按照租赁合同占有期限内发生所有权变动的，不影响租赁合同的效力
  original_text: 《民法典》第725条：租赁物在承租人按照租赁合同占有期限内发生所有权变动的，不影响租赁合同的效力。
  interpretation:
    core_principle: 租赁权具有物权化效力，所有权变动不影响租赁
    key_points:
    - 所有权变动不破租赁
    - 承租人必须已合法占有租赁物
    - 租赁合同继续有效
  contract_review_tips:
  - 购买租赁物前必须核查是否有租赁合同
  - 租赁合同是否办理登记备案
  - 买卖后原合同继续履行至期满
  risk_level: 高
  keywords:
  - 买卖不破租赁
  - 所有权变动
  - 物权化
  - 租赁权
  - 合同继续履行
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第725条
- id: LEASE-004
  name: 转租规则
  category: 租赁合同
  title: 承租人经出租人同意可以转租，未经同意转租的出租人可以解除合同，转租期限不得超过剩余租赁期限
  original_text: 《民法典》第716条：承租人经出租人同意，可以将租赁物转租给第三人。承租人转租的，承租人与出租人之间的租赁合同继续有效；第三人造成租赁物损失的，承租人应当赔偿损失。承租人未经出租人同意转租的，出租人可以解除合同。
  interpretation:
    core_principle: 转租必须经出租人同意，否则出租人享有解除权
    key_points:
    - 同意转租的合同继续有效
    - 次承租人造成损失由承租人赔偿
    - 未经同意转租出租人可解除合同
  contract_review_tips:
  - 必须明确约定是否允许转租
  - 同意转租的建议约定转租收益分配
  - 未经同意转租的6个月异议期
  risk_level: 中
  keywords:
  - 转租
  - 同意转租
  - 次承租人
  - 解除合同
  - 转租期限
  - 6个月异议期
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第716条
- id: CONT-001
  name: 承揽合同主要内容
  category: 承揽合同
  title: 承揽合同内容包括承揽的标的、数量、质量、报酬，承揽方式，材料的提供，履行期限，验收标准和方法等条款
  original_text: 《民法典》第771条：承揽合同的内容一般包括承揽的标的、数量、质量、报酬，承揽方式，材料的提供，履行期限，验收标准和方法等条款。
  interpretation:
    core_principle: 承揽合同必须明确工作成果标准和验收方式
    key_points:
    - 承揽标的必须明确具体
    - 质量标准和验收方法必须可操作
    - 材料提供责任要明确
    - 报酬支付与验收挂钩
  contract_review_tips:
  - 必须附详细的工作成果说明书或图纸
  - 验收标准必须量化可操作
  - 明确原材料提供方和质量标准
  - 建议约定阶段性验收节点
  risk_level: 中
  keywords:
  - 承揽合同
  - 承揽标的
  - 工作成果
  - 验收标准
  - 材料提供
  - 报酬
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第771条
- id: CONT-002
  name: 承揽人亲自完成主要工作义务
  category: 承揽合同
  title: 承揽人应当以自己的设备、技术和劳力完成主要工作，将主要工作交由第三人完成的应当经定作人同意
  original_text: 《民法典》第772条：承揽人应当以自己的设备、技术和劳力，完成主要工作，但是当事人另有约定的除外。承揽人将其承揽的主要工作交由第三人完成的，应当就该第三人完成的工作成果向定作人负责；未经定作人同意的，定作人也可以解除合同。
  interpretation:
    core_principle: 承揽合同具有人身属性，主要工作必须亲自完成
    key_points:
    - 以自身设备技术劳力完成
    - 主要工作交第三人需经同意
    - 未经同意定作人可解除合同
  contract_review_tips:
  - 必须明确界定"主要工作"范围
  - 同意分包的必须明确分包范围和责任
  - 发现擅自分包的及时行使解除权
  risk_level: 中
  keywords:
  - 亲自完成
  - 主要工作
  - 分包
  - 第三人
  - 解除合同
  - 人身属性
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第772条
- id: CONT-003
  name: 定作人任意解除权
  category: 承揽合同
  title: 定作人在承揽人完成工作前可以随时解除合同，造成承揽人损失的应当赔偿损失
  original_text: 《民法典》第787条：定作人在承揽人完成工作前可以随时解除合同，造成承揽人损失的，应当赔偿损失。
  interpretation:
    core_principle: 定作人享有任意解除权，但需赔偿损失
    key_points:
    - 随时解除无需理由
    - 必须在工作完成前行使
    - 造成损失必须赔偿
  contract_review_tips:
  - 作为定作人：解除前评估损失成本
  - 作为承揽人：保留已投入成本的证据
  - 建议约定解除时的损失计算方法
  risk_level: 高
  keywords:
  - 任意解除权
  - 随时解除
  - 赔偿损失
  - 承揽人损失
  - 已投入成本
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第787条
- id: CONT-004
  name: 工作成果验收与质量责任
  category: 承揽合同
  title: 承揽人完成工作后应当交付工作成果并提交必要的技术资料和有关质量证明，定作人应当验收该工作成果
  original_text: 《民法典》第779条：承揽人完成工作的，应当向定作人交付工作成果，并提交必要的技术资料和有关质量证明。定作人应当验收该工作成果。
  interpretation:
    core_principle: 承揽人不仅要交付成果，还要交付完整技术资料
    key_points:
    - 交付工作成果
    - 提交技术资料和质量证明
    - 定作人有验收义务
  contract_review_tips:
  - 必须列明应交付的技术资料清单
  - 验收不合格的必须书面提出异议
  - 建议约定质保期和质保金条款
  risk_level: 中
  keywords:
  - 工作成果
  - 验收
  - 技术资料
  - 质量证明
  - 质保期
  - 质量责任
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第779条
- id: CONS-001
  name: 建设工程合同形式与内容
  category: 建设工程合同
  title: 建设工程合同应当采用书面形式，内容包括工程范围、建设工期、中间交工工程的开工和竣工时间、工程质量、工程造价、技术资料交付时间等
  original_text: 《民法典》第789条：建设工程合同应当采用书面形式。第795条：施工合同的内容一般包括工程范围、建设工期、中间交工工程的开工和竣工时间、工程质量、工程造价、技术资料交付时间、材料和设备供应责任、拨款和结算、竣工验收、质量保修范围和质量保证期、相互协作等条款。
  interpretation:
    core_principle: 建设工程合同为要式合同，条款必须完整详细
    key_points:
    - 必须书面形式
    - 工程范围和工期明确
    - 造价和结算方式具体
    - 质量标准和质保期完整
  contract_review_tips:
  - 必须采用住建部标准合同文本
  - 明确合同价是固定价还是可调价
  - 工期节点必须明确且与付款挂钩
  - 质保期必须符合国家强制规定
  risk_level: 高
  keywords:
  - 建设工程合同
  - 书面形式
  - 工程范围
  - 建设工期
  - 工程造价
  - 竣工验收
  - 质保期
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第789、795条
- id: CONS-002
  name: 转包与违法分包禁止
  category: 建设工程合同
  title: 承包人不得将其承包的全部建设工程转包给第三人或者将其承包的全部建设工程支解以后以分包的名义分别转包给第三人
  original_text: 《民法典》第791条：发包人不得将应当由一个承包人完成的建设工程支解成若干部分发包给数个承包人。承包人不得将其承包的全部建设工程转包给第三人或者将其承包的全部建设工程支解以后以分包的名义分别转包给第三人。
  interpretation:
    core_principle: 禁止全部转包和支解转包，违法分包合同无效
    key_points:
    - 禁止全部转包
    - 禁止支解转包
    - 禁止分包给无资质单位
    - 禁止再分包
  contract_review_tips:
  - 核查分包单位资质
  - 禁止主体工程分包
  - 发现违法转包立即解除合同
  - 违法分包合同无效但工程合格可参照付款
  risk_level: 高
  keywords:
  - 转包
  - 违法分包
  - 支解转包
  - 分包资质
  - 再分包
  - 主体工程
  - 合同无效
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第791条
- id: CONS-003
  name: 工程款优先受偿权
  category: 建设工程合同
  title: 发包人未按照约定支付价款的，承包人可以催告发包人在合理期限内支付价款，逾期不付的承包人可就工程折价或拍卖价款优先受偿
  original_text: 《民法典》第807条：发包人未按照约定支付价款的，承包人可以催告发包人在合理期限内支付价款。发包人逾期不支付的，除根据建设工程的性质不宜折价、拍卖外，承包人可以与发包人协议将该工程折价，也可以请求人民法院将该工程依法拍卖。建设工程的价款就该工程折价或者拍卖的价款优先受偿。
  interpretation:
    core_principle: 建设工程价款优先于抵押权和其他债权受偿
    key_points:
    - 优先于抵押权受偿
    - 仅包括人员报酬和材料款
    - 行使期限为18个月
  contract_review_tips:
  - 必须在竣工后18个月内行使
  - 可通过诉讼或发函方式行使
  - 优先受偿权可预先放弃吗？要谨慎
  risk_level: 高
  keywords:
  - 优先受偿权
  - 工程款
  - 折价拍卖
  - 抵押权
  - 18个月
  - 建设工程价款
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第807条
- id: CONS-004
  name: 建设工程质量责任与保修
  category: 建设工程合同
  title: 建设工程竣工经验收合格后，方可交付使用；未经验收或者验收不合格的，不得交付使用
  original_text: 《民法典》第799条：建设工程竣工后，发包人应当根据施工图纸及说明书、国家颁发的施工验收规范和质量检验标准及时进行验收。验收合格的，发包人应当按照约定支付价款，并接收该建设工程。建设工程竣工经验收合格后，方可交付使用；未经验收或者验收不合格的，不得交付使用。
  interpretation:
    core_principle: 验收合格是交付使用的前提，质量责任终身追究
    key_points:
    - 验收合格方可交付
    - 擅自使用视为验收合格
    - 地基基础和主体结构终身保修
  contract_review_tips:
  - 未验收合格不得擅自使用
  - 必须保留完整验收资料
  - 质保期必须符合国家强制标准（地基/主体终身）
  - 质量缺陷必须书面通知整改
  risk_level: 高
  keywords:
  - 竣工验收
  - 交付使用
  - 质量责任
  - 质保期
  - 终身保修
  - 质量缺陷
  - 验收合格
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第799条
- id: TRAN-001
  name: 承运人强制缔约义务
  category: 运输合同
  title: 从事公共运输的承运人不得拒绝旅客、托运人通常、合理的运输要求
  original_text: 《民法典》第810条：从事公共运输的承运人不得拒绝旅客、托运人通常、合理的运输要求。
  interpretation:
    core_principle: 公共运输承运人有强制缔约义务，不得拒载
    key_points:
    - 公共运输不得拒载
    - 仅限于通常合理要求
    - 拒载造成损失要赔偿
  contract_review_tips:
  - 保留运输要求被拒绝的证据
  - 运输要求必须合理
  - 非公共运输不适用强制缔约
  risk_level: 中
  keywords:
  - 公共运输
  - 强制缔约
  - 不得拒载
  - 合理运输要求
  - 承运人义务
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第810条
- id: TRAN-002
  name: 承运人安全运输义务
  category: 运输合同
  title: 承运人应当在约定期限或者合理期限内将旅客、货物安全运输到约定地点
  original_text: 《民法典》第811条：承运人应当在约定期限或者合理期限内将旅客、货物安全运输到约定地点。
  interpretation:
    core_principle: 安全准时是承运人的核心义务，对运输过程中的损失承担责任
    key_points:
    - 安全运输到约定地点
    - 约定期限或合理期限内
    - 运输中货损承运人承担责任
  contract_review_tips:
  - 必须明确约定运输起止地点
  - 明确运输时限和延误责任
  - 必须购买足额货物保险
  - 贵重货物建议声明价值
  risk_level: 高
  keywords:
  - 安全运输
  - 运输期限
  - 约定地点
  - 货物损失
  - 运输保险
  - 延误责任
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第811条
- id: TRAN-003
  name: 货损赔偿责任
  category: 运输合同
  title: 承运人对运输过程中货物的毁损、灭失承担赔偿责任，但不可抗力、货物本身自然性质或合理损耗、托运人收货人过错造成的除外
  original_text: 《民法典》第832条：承运人对运输过程中货物的毁损、灭失承担赔偿责任。但是，承运人证明货物的毁损、灭失是因不可抗力、货物本身的自然性质或者合理损耗以及托运人、收货人的过错造成的，不承担赔偿责任。
  interpretation:
    core_principle: 承运人对货损承担无过错责任，但有三个免责事由
    key_points:
    - 无过错责任
    - 不可抗力免责
    - 货物自然性质/合理损耗免责
    - 托运人收货人过错免责
  contract_review_tips:
  - 必须保留货物包装和交付时完好的证据
  - 准确申报货物名称和价值
  - 贵重物品必须声明价值
  - 免责事由举证责任在承运人
  risk_level: 高
  keywords:
  - 货物毁损
  - 货物灭失
  - 赔偿责任
  - 无过错责任
  - 不可抗力
  - 合理损耗
  - 免责事由
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第832条
- id: TRAN-004
  name: 多式联运规则
  category: 运输合同
  title: 多式联运经营人负责履行或者组织履行多式联运合同，对全程运输享有承运人的权利，承担承运人的义务
  original_text: 《民法典》第838条：多式联运经营人负责履行或者组织履行多式联运合同，对全程运输享有承运人的权利，承担承运人的义务。
  interpretation:
    core_principle: 多式联运经营人对全程负责，各区段承运人仅对自己区段负责
    key_points:
    - 经营人全程负责
    - 可与区段承运人约定责任
    - 发生损失适用该区段法律规定
  contract_review_tips:
  - 必须明确多式联运经营人主体
  - 明确各运输区段的责任划分
  - 货损发生区段不明确的由经营人承担
  risk_level: 中
  keywords:
  - 多式联运
  - 联运经营人
  - 全程运输
  - 区段承运人
  - 责任划分
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第838条
- id: TECH-001
  name: 技术合同类型与内容
  category: 技术合同
  title: 技术合同是当事人就技术开发、转让、许可、咨询或者服务订立的确立相互之间权利和义务的合同
  original_text: 《民法典》第843条：技术合同是当事人就技术开发、转让、许可、咨询或者服务订立的确立相互之间权利和义务的合同。
  interpretation:
    core_principle: 技术合同分为开发/转让/许可/咨询/服务五大类，各有特殊规则
    key_points:
    - 技术开发合同（委托/合作）
    - 技术转让合同（专利权/专利申请权/技术秘密）
    - 技术许可合同（专利实施/技术秘密使用）
    - 技术咨询/服务合同
  contract_review_tips:
  - 先明确合同类型再适用对应规则
  - 技术合同必须有明确的技术内容
  - 必须明确知识产权归属
  - 禁止滥用知识产权限制技术进步
  risk_level: 中
  keywords:
  - 技术合同
  - 技术开发
  - 技术转让
  - 技术许可
  - 技术咨询
  - 技术服务
  - 知识产权
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第843条
- id: TECH-002
  name: 技术开发合同风险负担
  category: 技术合同
  title: 在技术开发合同履行过程中，因出现无法克服的技术困难致使研究开发失败或者部分失败的，风险由当事人约定，无约定合理分担
  original_text: 《民法典》第858条：技术开发合同履行过程中，因出现无法克服的技术困难，致使研究开发失败或者部分失败的，该风险由当事人约定；没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定的，风险由当事人合理分担。
  interpretation:
    core_principle: 技术开发有固有风险，失败风险按约定，无约定合理分担
    key_points:
    - 技术失败风险约定优先
    - 无法克服的技术困难属风险范畴
    - 无约定合理分担
  contract_review_tips:
  - 必须约定技术失败的认定标准
  - 必须约定风险分担比例
  - 发现技术困难及时通知对方并采取减损措施
  - 保留技术研发过程记录
  risk_level: 高
  keywords:
  - 技术开发
  - 技术风险
  - 研发失败
  - 风险负担
  - 合理分担
  - 技术困难
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第858条
- id: TECH-003
  name: 职务技术成果归属
  category: 技术合同
  title: 职务技术成果的使用权、转让权属于法人或者非法人组织的，法人或者非法人组织可以就该项职务技术成果订立技术合同
  original_text: 《民法典》第847条：职务技术成果的使用权、转让权属于法人或者非法人组织的，法人或者非法人组织可以就该项职务技术成果订立技术合同。法人或者非法人组织应当从使用和转让该项职务技术成果所取得的收益中提取一定比例，对完成该项职务技术成果的个人给予奖励或者报酬。
  interpretation:
    core_principle: 职务技术成果归单位，完成人有获得奖励和优先受让权
    key_points:
    - 职务成果归单位
    - 完成人有获得奖励报酬权
    - 完成人有优先受让权
  contract_review_tips:
  - 签约前必须核查技术成果归属
  - 职务技术成果必须由单位签约
  - 完成人奖励报酬建议约定具体比例
  - 离职员工技术成果要注意是否属职务成果
  risk_level: 高
  keywords:
  - 职务技术成果
  - 成果归属
  - 奖励报酬
  - 优先受让权
  - 完成人
  - 知识产权归属
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第847条
- id: TECH-004
  name: 技术咨询合同委托人责任
  category: 技术合同
  title: 技术咨询合同的委托人按照受托人符合约定要求的咨询报告和意见作出决策所造成的损失，由委托人承担，当事人另有约定除外
  original_text: 《民法典》第881条：技术咨询合同的委托人未按照约定提供必要的资料，影响工作进度和质量，不接受或者逾期接受工作成果的，支付的报酬不得追回，未支付的报酬应当支付。技术咨询合同的受托人应当按照约定的期限完成咨询报告或者解答问题，提出的咨询报告应当达到约定的要求。
  interpretation:
    core_principle: 技术咨询仅供参考，决策风险由委托人自行承担
    key_points:
    - 委托人按咨询决策风险自担
    - 受托人仅对咨询质量负责
    - 可约定特殊的风险承担方式
  contract_review_tips:
  - 必须明确咨询报告的质量标准和验收方式
  - 建议约定决策风险承担条款
  - 咨询意见仅供参考不构成保证
  - 重大决策建议多方论证
  risk_level: 中
  keywords:
  - 技术咨询
  - 咨询报告
  - 决策风险
  - 风险自担
  - 受托人责任
  - 咨询意见
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第881条
- id: ENT-001
  name: 委托合同定义与受托人义务
  category: 委托合同
  title: 委托合同是委托人和受托人约定，由受托人处理委托人事务的合同，受托人应当按照委托人的指示处理委托事务
  original_text: 《民法典》第919条：委托合同是委托人和受托人约定，由受托人处理委托人事务的合同。第922条：受托人应当按照委托人的指示处理委托事务。需要变更委托人指示的，应当经委托人同意；因情况紧急，难以和委托人取得联系的，受托人应当妥善处理委托事务，但是事后应当将该情况及时报告委托人。
  interpretation:
    core_principle: 受托人应严格按委托人指示处理事务，紧急情况可先处理后报告
    key_points:
    - 按委托人指示处理
    - 变更指示需经同意
    - 紧急情况可先处理后报告
    - 报告义务
  contract_review_tips:
  - 必须明确委托权限（特别授权需逐项列明）
  - 禁止"全权委托"等模糊表述
  - 转委托必须经同意
  - 受托人应定期报告事务进展
  risk_level: 高
  keywords:
  - 委托合同
  - 受托人义务
  - 委托权限
  - 特别授权
  - 指示处理
  - 报告义务
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第919、922条
- id: ENT-002
  name: 转委托规则
  category: 委托合同
  title: 受托人应当亲自处理委托事务，经委托人同意受托人可以转委托，转委托未经同意的受托人应当对转委托的第三人行为承担责任
  original_text: 《民法典》第923条：受托人应当亲自处理委托事务。经委托人同意，受托人可以转委托。转委托经同意或者追认的，委托人可以就委托事务直接指示转委托的第三人，受托人仅就第三人的选任及其对第三人的指示承担责任。转委托未经同意或者追认的，受托人应当对转委托的第三人的行为承担责任；但是，在紧急情况下受托人为了维护委托人的利益需要转委托第三人的除外。
  interpretation:
    core_principle: 委托合同有人身属性，转委托必须经同意，紧急情况例外
    key_points:
    - 亲自处理为原则
    - 转委托需经同意或追认
    - 紧急情况例外
    - 同意转委托的受托人仅对选任和指示负责
  contract_review_tips:
  - 必须明确是否允许转委托
  - 同意转委托的建议限定转委托范围
  - 转委托必须确认第三人资质和能力
  - 紧急转委托必须在事后及时报告
  risk_level: 中
  keywords:
  - 转委托
  - 亲自处理
  - 转委托同意
  - 紧急转委托
  - 第三人行为
  - 选任责任
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第923条
- id: ENT-003
  name: 委托人任意解除权
  category: 委托合同
  title: 委托人或者受托人可以随时解除委托合同，因解除合同造成对方损失的，除不可归责于该当事人的事由外，应当赔偿损失
  original_text: 《民法典》第933条：委托人或者受托人可以随时解除委托合同。因解除合同造成对方损失的，除不可归责于该当事人的事由外，无偿委托合同的解除方应当赔偿因解除时间不当造成的直接损失，有偿委托合同的解除方应当赔偿对方的直接损失和合同履行后可以获得的利益。
  interpretation:
    core_principle: 双方都有任意解除权，但解除造成损失要赔偿，有偿委托赔偿范围更大
    key_points:
    - 双方均可随时解除
    - 无偿委托赔偿直接损失
    - 有偿委托赔偿直接损失+可得利益
  contract_review_tips:
  - 作为委托人：解除前评估损失成本
  - 作为受托人：保留已投入成本的证据
  - 建议约定解除通知方式和损失计算方法
  - 重大事项委托建议约定解除违约金
  risk_level: 高
  keywords:
  - 任意解除权
  - 随时解除
  - 赔偿损失
  - 直接损失
  - 可得利益
  - 有偿委托
  - 无偿委托
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第933条
- id: ENT-004
  name: 受托人过错赔偿责任
  category: 委托合同
  title: 有偿的委托合同，因受托人的过错造成委托人损失的，委托人可以请求赔偿损失；无偿的委托合同，因受托人的故意或者重大过失造成委托人损失的，委托人可以请求赔偿损失
  original_text: 《民法典》第929条：有偿的委托合同，因受托人的过错造成委托人损失的，委托人可以请求赔偿损失。无偿的委托合同，因受托人的故意或者重大过失造成委托人损失的，委托人可以请求赔偿损失。受托人超越权限造成委托人损失的，应当赔偿损失。
  interpretation:
    core_principle: 有偿委托受托人过错即赔，无偿委托仅故意或重大过失才赔
    key_points:
    - 有偿委托：一般过错即赔
    - 无偿委托：仅故意/重大过失赔偿
    - 超越权限必须赔偿
  contract_review_tips:
  - 建议采用有偿委托，受托人责任更大
  - 必须明确委托权限边界
  - 超越权限行为必须事后追认才有效
  - 受托人行权必须保留书面证据
  risk_level: 高
  keywords:
  - 受托人责任
  - 过错赔偿
  - 有偿委托
  - 无偿委托
  - 故意
  - 重大过失
  - 超越权限
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第929条
- id: SOFT-001
  name: 软件知识产权归属规则
  category: 软件合同
  title: 软件著作权归属必须明确约定，委托开发无约定的归受托人，定制开发无约定归开发者
  original_text: 《著作权法》第17条：受委托创作的作品，著作权的归属由委托人和受托人通过合同约定。合同未作明确约定或者没有订立合同的，著作权属于受托人。《计算机软件保护条例》第11条：接受他人委托开发的软件，其著作权的归属由委托人与受托人签订书面合同约定；无书面合同或者合同未作明确约定的，其著作权由受托人享有。
  interpretation:
    core_principle: 软件知识产权归属约定优先，无约定法定归开发者，这是软件合同第一风险点
    key_points:
    - 无约定归受托人/开发者
    - 必须明确著作权、专利权、商业秘密等全部IP归属
    - 源代码交付不等于知识产权转让
  contract_review_tips:
  - 软件合同第一条就是知识产权归属条款，绝不能遗漏
  - 甲方采购必须明确约定"所有知识产权归甲方所有"
  - 源代码交付要同时明确交付范围、介质、时间和验收标准
  - 乙方保留知识产权的必须明确甲方的使用许可范围
  risk_level: 高
  keywords:
  - 软件著作权
  - 知识产权归属
  - 源代码交付
  - 委托开发
  - 定制开发
  - IP归属
  version: '1.0'
  updated: '2026-04-24'
  source: 著作权法第17条、计算机软件保护条例第11条
- id: SOFT-002
  name: 软件使用许可范围规则
  category: 软件合同
  title: 软件使用许可必须明确用户数、并发数、使用地域、使用期限、使用场景，超出视为侵权
  original_text: 《计算机软件保护条例》第24条：未经软件著作权人许可，修改、翻译其软件的，或者复制或者部分复制著作权人的软件的，应当根据情况，承担停止侵害、消除影响、赔礼道歉、赔偿损失等民事责任。
  interpretation:
    core_principle: 软件许可使用必须明确边界，超范围使用构成侵权，需承担民事甚至刑事责任
    key_points:
    - 必须明确许可方式（永久/年付/订阅）
    - 必须明确使用范围（用户数/并发数/服务器数）
    - 必须明确使用地域（国内/全球）
    - 必须明确使用场景（内部/对外服务）
  contract_review_tips:
  - 作为甲方：尽量争取"企业级全用户永久许可"
  - 作为乙方：必须严格限定使用范围，越详细越安全
  - 许可范围模糊的按有利于著作权人解释
  - SaaS模式必须明确账号数量和并发限制
  risk_level: 高
  keywords:
  - 软件许可
  - 使用范围
  - 用户数
  - 并发数
  - 永久许可
  - 订阅模式
  - SaaS
  - 超范围使用
  version: '1.0'
  updated: '2026-04-24'
  source: 计算机软件保护条例第24条
- id: SOFT-003
  name: 软件验收标准与UAT验收规则
  category: 软件合同
  title: 软件验收必须量化可操作，功能验收、性能验收、UAT验收三阶段缺一不可，验收标准必须作为合同附件
  original_text: 《民法典》第621条：当事人约定检验期限的，买受人应当在检验期限内将标的物的数量或者质量不符合约定的情形通知出卖人。怠于通知的，视为符合约定。（软件验收适用本规则）
  interpretation:
    core_principle: 软件验收标准必须具体量化，"运行正常"等模糊表述视为无约定，UAT验收是软件交付的关键节点
    key_points:
    - 功能验收：功能点覆盖率100%，每功能有验收用例
    - 性能验收：响应时间、并发量、稳定性等量化指标
    - UAT验收：用户真实场景测试，必须签字确认
    - 验收标准必须作为合同附件，双方签字盖章
  contract_review_tips:
  - 绝对不能接受"验收合格"无具体标准的约定
  - 每个功能点都要有验收用例和预期结果
  - 性能指标必须量化（如"单接口响应时间<500ms"）
  - UAT验收必须约定周期和通过标准，"试运行30天无重大bug"
  - 验收不通过必须明确整改期限和次数，超期可解除合同
  risk_level: 高
  keywords:
  - 软件验收
  - UAT验收
  - 功能验收
  - 性能验收
  - 验收用例
  - 验收标准
  - 试运行
  - 验收附件
  version: '1.0'
  updated: '2026-04-24'
  source: 民法典第621条软件验收适用
- id: SOFT-004
  name: 技术支持与运维SLA规则
  category: 软件合同
  title: 技术支持SLA必须明确响应时间、解决时间、服务时间范围，未达SLA应有明确赔偿/退款机制
  original_text: 《民法典》第577条：当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。
  interpretation:
    core_principle: SLA（服务等级协议）是运维服务合同的核心，无量化SLA等于无服务标准，违约赔偿必须可操作
    key_points:
    - 服务时间：7x24/5x8/工作日支持
    - 响应时间：P1/P2/P3/P4分级响应
    - 解决时间：分级问题解决时限
    - 未达SLA的赔偿机制（如每超1小时赔偿1%月费）
  contract_review_tips:
  - 问题分级必须明确定义（P1=系统不可用，P2=核心功能不可用等）
  - 响应时间和解决时间必须量化到小时
  - SLA达标率必须有计算公式和月报机制
  - 未达SLA的赔偿必须有明确的计算方法和上限
  - 重大故障必须有应急方案和灾难恢复承诺
  risk_level: 中
  keywords:
  - 技术支持
  - 运维服务
  - SLA
  - 服务等级协议
  - 响应时间
  - 解决时间
  - 7x24小时
  - 服务赔偿
  version: '1.0'
  updated: '2026-04-24'
  source: 民法典第577条违约责任
- id: SOFT-005
  name: 开源软件合规义务
  category: 软件合同
  title: 软件产品使用开源代码必须声明并提供合规清单，GPL等传染性许可证可能导致整个产品开源，需特别审查
  original_text: 开源许可证具有法律约束力，违反开源许可证条款构成著作权侵权。GPL许可证具有"传染性"，衍生作品也必须开源。
  interpretation:
    core_principle: 开源软件免费但不自由，许可证义务必须严格遵守，GPL传染风险是软件产品的重大IP风险
    key_points:
    - 所有使用的开源软件必须列出完整清单
    - 每个开源组件必须注明许可证类型和版本
    - GPL/LGPL/AGPL等强 Copyleft 许可证必须特别审查
    - AGPL云服务使用也触发开源义务
  contract_review_tips:
  - 乙方必须提供完整的开源软件清单和许可证说明
  - 禁止使用AGPL许可证的代码（SaaS服务也传染）
  - GPL代码必须隔离，不能与专有代码静态链接
  - 必须约定开源合规担保和违反时的赔偿责任
  - 交付时必须提供SBOM（软件物料清单）
  risk_level: 高
  keywords:
  - 开源软件
  - 开源许可证
  - GPL
  - AGPL
  - Copyleft
  - 开源合规
  - SBOM
  - 软件物料清单
  - 传染性开源
  version: '1.0'
  updated: '2026-04-24'
  source: 开源许可证法律效力、著作权法
- id: SOFT-006
  name: 数据安全与用户数据保护责任
  category: 软件合同
  title: 软件涉及用户数据处理的必须明确数据权属、数据安全责任、数据泄露赔偿机制，符合数据安全法和个人信息保护法要求
  original_text: 《数据安全法》第27条：开展数据处理活动应当依照法律、法规的规定，建立健全全流程数据安全管理制度，组织开展数据安全教育培训，采取相应的技术措施和其他必要措施，保障数据安全。《个人信息保护法》第51条：个人信息处理者应当根据个人信息的处理目的、处理方式、个人信息的种类以及对个人权益的影响、可能存在的安全风险等，采取相应措施确保个人信息处理活动合法合规。
  interpretation:
    core_principle: 数据权属和安全责任是软件合同的法定要求，数据泄露的赔偿责任可能远超合同金额
    key_points:
    - 数据所有权归客户还是服务商必须明确
    - 数据安全责任划分（主机安全/应用安全/运维安全）
    - 数据泄露的通知时限和赔偿责任
    - 数据备份和恢复的SLA要求
  contract_review_tips:
  - SaaS合同必须明确数据所有权归客户
  - 数据安全责任必须分层次明确（机房/网络/应用/运维）
  - 数据泄露必须约定"24小时内通知"义务
  - 数据泄露赔偿必须有明确计算方法，建议设上限
  - 必须约定合同终止后的数据删除/导出义务和时限
  risk_level: 高
  keywords:
  - 数据安全
  - 个人信息保护
  - 数据所有权
  - 数据泄露
  - 数据备份
  - 数据删除
  - PIPL
  - DSL
  - 数据安全法
  version: '1.0'
  updated: '2026-04-24'
  source: 数据安全法第27条、个人信息保护法第51条
- id: SOFT-007
  name: 软件知识产权侵权担保
  category: 软件合同
  title: 软件供应商必须担保其软件不侵犯第三方知识产权，发生侵权诉讼的供应商必须应诉并承担全部赔偿责任
  original_text: 《民法典》第612条：出卖人就交付的标的物，负有保证第三人对该标的物不享有任何权利的义务，但是法律另有规定的除外。第614条：买受人有确切证据证明第三人对标的物享有权利的，可以中止支付相应的价款，但是出卖人提供适当担保的除外。
  interpretation:
    core_principle: 软件知识产权瑕疵担保是法定责任，供应商必须对侵权结果兜底，包括律师费和赔偿金
    key_points:
    - 供应商担保软件不侵犯第三方知识产权
    - 发生侵权指控时供应商必须独立应诉
    - 供应商承担全部赔偿责任（包括律师费）
    - 侵权时供应商必须提供替代方案或修改方案
  contract_review_tips:
  - 必须有明确的知识产权侵权担保条款
  - 供应商必须承担全部诉讼费用和赔偿金额
  - 发生侵权时供应商必须提供三种救济方案：修改/替换/退款
  - 建议约定侵权赔偿责任上限不低于合同金额的2倍
  - 注意开源软件引起的侵权也属于担保范围
  risk_level: 高
  keywords:
  - 知识产权担保
  - 侵权赔偿
  - 瑕疵担保
  - 第三方权利
  - 专利侵权
  - 著作权侵权
  - 应诉责任
  - 律师费承担
  version: '1.0'
  updated: '2026-04-24'
  source: 民法典第612、614条权利瑕疵担保
- id: SOFT-008
  name: SaaS服务合同特殊规则
  category: 软件合同
  title: SaaS合同必须特别关注数据所有权、服务可用性SLA、数据可导出性、合同终止后数据保留与删除义务
  original_text: SaaS（软件即服务）是订阅制软件服务模式，核心特征是数据存储在服务商云端，用户通过网络访问。除通用合同法外还适用数据安全法、个人信息保护法。
  interpretation:
    core_principle: SaaS不同于传统软件销售，核心风险在数据控制权和服务持续性，必须用专门条款规制
    key_points:
    - 数据100%归客户所有是基本原则
    - 服务可用性SLA必须量化（如99.9%可用率=年停机8.76小时）
    - 数据可导出格式必须标准化（Excel/CSV/数据库导出）
    - 合同终止后数据保留期限和永久删除义务
  contract_review_tips:
  - SaaS合同第一条就写"客户数据所有权归客户所有"
  - 可用性SLA必须有计算公式和月度报告义务
  - 未达SLA的赔偿必须明确（如每少0.1%可用率赔偿1%月费）
  - 必须约定数据导出功能和导出格式标准
  - 合同终止后至少保留30天数据供导出，之后必须彻底删除
  - 必须明确数据存储地域（如仅限中国大陆境内）
  risk_level: 高
  keywords:
  - SaaS
  - 软件即服务
  - 订阅制
  - 数据所有权
  - 可用性SLA
  - 数据导出
  - 数据删除
  - 数据存储地域
  - 云服务
  version: '1.0'
  updated: '2026-04-24'
  source: SaaS服务商业模式适用法律规则总结
