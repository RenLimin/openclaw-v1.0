# ==============================================
# OpenClaw docker-compose.yml v1.0
# 一键编排启动完整智能体系统
# ==============================================

version: '3.8'

services:
  # --------------------------
  # OpenClaw 主服务
  # --------------------------
  openclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openclaw-main
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OPENCLAW_ENV=production
      - OPENCLAW_HOME=/app
    volumes:
      - ../core-config:/app/core-config:ro
      - ../memory:/app/memory
      - ../knowledge-base:/app/knowledge-base:ro
      - ../skills:/app/skills:ro
      - ./data:/app/data
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "python", "/app/scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --------------------------
  # 可选：Prometheus 监控
  # --------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - openclaw-network
    profiles:
      - monitoring

  # --------------------------
  # 可选：Grafana 可视化看板
  # --------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - openclaw-network
    profiles:
      - monitoring

# --------------------------
# 网络配置
# --------------------------
networks:
  openclaw-network:
    driver: bridge

# --------------------------
# 数据卷
# --------------------------
volumes:
  prometheus-data:
  grafana-data:

# ==============================================
# 版本：v1.0 | 最后更新：2026-05-08
# ==============================================
