# ==============================================
# Pytest 配置文件
# ==============================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试报告输出
addopts = 
    -v
    --strict-markers
    --cov=scripts
    --cov-report=term
    --cov-report=html:tests/coverage_html
    --cov-report=xml:tests/coverage.xml
    --tb=short

# 标记说明
markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    unit: 标记单元测试
    smoke: 冒烟测试

