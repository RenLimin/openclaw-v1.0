# 合同风险关键词配置
# 根据关键词匹配识别风险条款

risk_rules:

  # 🔴 高风险关键词
  high_risk:
    level: "🔴 高风险"
    color: "FF0000"
    keywords:
      - "全部责任"
      - "所有损失"
      - "全部损失"
      - "无限责任"
      - "无限连带"
      - "连带责任"
      - "巨额赔偿"
      - "高额违约金"
      - "赔偿全部损失"
      - "单方解除权"
      - "有权单方解除"
      - "有权随时终止"
      - "可随时终止"
      - "最终解释权"
      - "甲方享有最终解释权"
      - "全部知识产权归甲方所有"
      - "所有知识产权"
      - "永久授权"
      - "永久许可"
      - "无限期授权"
      - "终身保密"
      - "永久保密"
      - "不得异议"
      - "不得主张任何权利"
      - "不得起诉"
      - "放弃抗辩权"
      - "放弃追索"

  # 🟡 中风险关键词
  medium_risk:
    level: "🟡 中风险"
    color: "FFA500"
    keywords:
      - "单方解除"
      - "有权解除"
      - "有权终止"
      - "违约金"
      - "赔偿损失"
      - "逾期违约金"
      - "每日.*%"
      - "按日.*%"
      - "滞纳金"
      - "逾期利息"
      - "赔偿责任"
      - "承担.*赔偿"
      - "赔偿.*万元"
      - "赔偿金"
      - "损害赔偿"
      - "不低于"
      - "不超过"
      - "最高赔偿额"
      - "赔偿限额"
      - "保密期限"
      - "不得泄露"
      - "不得披露"
      - "保密义务"
      - "保密责任"
      - "保密条款"
      - "侵权责任"
      - "侵权"
      - "违约责任"
      - "违约方"
      - "根本违约"
      - "严重违约"

  # 🟢 低风险关键词
  low_risk:
    level: "🟢 低风险"
    color: "008000"
    keywords:
      - "可以"
      - "可以选择"
      - "建议"
      - "协商"
      - "协商一致"
      - "双方协商"
      - "友好协商"
      - "酌情"
      - "可以根据实际情况"
      - "参照"
      - "参考"
      - "经双方确认"
      - "经甲方确认"
      - "经乙方确认"

# 风险说明模板
risk_explanation:
  高风险: "该条款可能对我方权益产生重大不利影响，建议重点关注并评估修改可能"
  中风险: "该条款存在一定风险，建议仔细评估，考虑是否需要调整"
  低风险: "该条款风险较低，但仍需留意具体适用情形"
