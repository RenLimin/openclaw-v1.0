description: 民法典合同编-买卖合同章节
version: '1.1'
updated: '2026-04-24'
articles:
- id: CC-595
  name: 买卖合同定义
  category: 买卖合同
  title: 买卖合同是出卖人转移标的物的所有权于买受人，买受人支付价款的合同
  original_text: '第五百九十五条 买卖合同是出卖人转移标的物的所有权于买受人，买受人支付价款的合同。

    '
  interpretation:
    core_principle: 转移所有权+支付价款是买卖合同的核心特征
    key_points:
    - 出卖人义务：转移标的物所有权
    - 买受人义务：支付价款
    - 买卖合同是双务有偿合同
  contract_review_tips: 合同应明确标的物所有权转移时间和价款支付方式
  risk_level: 低
  keywords:
  - 买卖合同
  - 转移所有权
  - 支付价款
  - 出卖人
  - 买受人
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-596
  name: 买卖合同条款
  category: 买卖合同
  title: 买卖合同的内容一般包括标的物的名称、数量、质量、价款、履行期限等条款
  original_text: '第五百九十六条 买卖合同的内容一般包括标的物的名称、数量、质量、价款、履行期限、履行地点和方式、包装方式、检验标准和方法、结算方式、合同使用的文字及其效力等条款。

    '
  interpretation:
    core_principle: 买卖合同应具备核心条款以避免争议
    key_points:
    - 标的物基本信息（名称、数量、质量）
    - 价款及支付方式
    - 履行期限、地点、方式
    - 包装、检验、结算条款
  contract_review_tips: 确保合同包含所有核心条款，特别是质量、验收、付款方式
  risk_level: 中
  keywords:
  - 合同条款
  - 标的物
  - 数量
  - 质量
  - 价款
  - 履行期限
  - 检验标准
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-597
  name: 无权处分效力
  category: 买卖合同
  title: 因出卖人未取得处分权致使标的物所有权不能转移的，买受人可以解除合同并请求出卖人承担违约责任
  original_text: '第五百九十七条 因出卖人未取得处分权致使标的物所有权不能转移的，买受人可以解除合同并请求出卖人承担违约责任。

    法律、行政法规禁止或者限制转让的标的物，依照其规定。

    '
  interpretation:
    core_principle: 无权处分不影响合同效力，但可能导致履行不能
    key_points:
    - 无权处分的买卖合同有效（区分原则）
    - 买受人无法取得所有权的可解除合同
    - 出卖人应承担违约责任
  contract_review_tips: 重要标的物应核实出卖人所有权或处分权，避免无权处分风险
  risk_level: 高
  keywords:
  - 无权处分
  - 处分权
  - 所有权转移
  - 解除合同
  - 区分原则
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-601
  name: 交付时间
  category: 交付义务
  title: 出卖人应当按照约定的时间交付标的物
  original_text: '第六百零一条 出卖人应当按照约定的时间交付标的物。约定交付期限的，出卖人可以在该交付期限内的任何时间交付。

    '
  interpretation:
    core_principle: 按约定时间交付，约定期限内可随时交付
    key_points:
    - 按约定时间交付
    - 约定期间的可在期间内任何时间交付
    - 未约定的适用合同解释规则
  contract_review_tips: 明确约定具体交付日期或期限，避免使用模糊表述
  risk_level: 中
  keywords:
  - 交付时间
  - 交付期限
  - 交付日期
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-602
  name: 交付期限约定不明
  category: 交付义务
  title: 当事人没有约定标的物的交付期限或者约定不明确的，适用本法第五百一十条、第五百一十一条第四项的规定
  original_text: '第六百零二条 当事人没有约定标的物的交付期限或者约定不明确的，适用本法第五百一十条、第五百一十一条第四项的规定。

    '
  interpretation:
    core_principle: 交付期限约定不明的适用总则规定
    key_points:
    - 首先协议补充
    - 其次按条款或交易习惯
    - 最后债务人可随时履行，债权人可随时请求但应给准备时间
  contract_review_tips: 交付期限务必明确约定，避免不确定性
  risk_level: 中
  keywords:
  - 交付期限
  - 约定不明
  - 随时履行
  - 准备时间
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-603
  name: 交付地点
  category: 交付义务
  title: 出卖人应当按照约定的地点交付标的物
  original_text: '第六百零三条 出卖人应当按照约定的地点交付标的物。

    当事人没有约定交付地点或者约定不明确，依据本法第五百一十条的规定仍不能确定的，适用下列规定：

    （一）标的物需要运输的，出卖人应当将标的物交付给第一承运人以运交给买受人；

    （二）标的物不需要运输，出卖人和买受人订立合同时知道标的物在某一地点的，出卖人应当在该地点交付标的物；不知道标的物在某一地点的，应当在出卖人订立合同时的营业地交付标的物。

    '
  interpretation:
    core_principle: 约定优先，无约定时依运输规则确定
    key_points:
    - 需要运输的：货交第一承运人即完成交付
    - 不需要运输的：订立合同时知道标的物所在地的在该地交付
    - 否则在出卖人营业地交付
  contract_review_tips: 明确约定交付地点，特别是涉及运输的合同
  risk_level: 中
  keywords:
  - 交付地点
  - 第一承运人
  - 需要运输
  - 营业地交付
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-604
  name: 风险转移规则
  category: 风险转移
  title: 标的物毁损、灭失的风险，在标的物交付之前由出卖人承担，交付之后由买受人承担
  original_text: '第六百零四条 标的物毁损、灭失的风险，在标的物交付之前由出卖人承担，交付之后由买受人承担，但是法律另有规定或者当事人另有约定的除外。

    '
  interpretation:
    core_principle: 交付转移风险为基本原则
    key_points:
    - 交付前风险由出卖人承担
    - 交付后风险由买受人承担
    - 法律另有规定或当事人另有约定的除外
    - 风险转移与所有权转移可以分离
  contract_review_tips: 明确约定风险转移时间，特别是货交承运人时的风险承担
  risk_level: 高
  keywords:
  - 风险转移
  - 毁损灭失
  - 交付风险
  - 风险承担
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-605
  name: 买受人迟延受领风险
  category: 风险转移
  title: 因买受人的原因致使标的物未按照约定的期限交付的，买受人应当自违反约定时起承担标的物毁损、灭失的风险
  original_text: '第六百零五条 因买受人的原因致使标的物未按照约定的期限交付的，买受人应当自违反约定时起承担标的物毁损、灭失的风险。

    '
  interpretation:
    core_principle: 买受人原因导致迟延交付的，风险提前转移
    key_points:
    - 买受人原因导致迟延交付
    - 风险自违反约定时起转移
    - 体现公平原则，违约方承担风险
  contract_review_tips: 买受人迟延收货时，及时通知并固定证据，风险由买受人承担
  risk_level: 中
  keywords:
  - 迟延受领
  - 买受人原因
  - 迟延交付
  - 风险提前转移
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-606
  name: 在途货物买卖风险
  category: 风险转移
  title: 出卖人出卖交由承运人运输的在途标的物，除当事人另有约定外，毁损、灭失的风险自合同成立时起由买受人承担
  original_text: '第六百零六条 出卖人出卖交由承运人运输的在途标的物，除当事人另有约定外，毁损、灭失的风险自合同成立时起由买受人承担。

    '
  interpretation:
    core_principle: 路货买卖风险自合同成立时转移
    key_points:
    - 路货买卖（在途标的物）
    - 风险自合同成立时转移
    - 当事人可另行约定
  contract_review_tips: 在途货物买卖应明确风险转移时间，可约定卖方承担装运前的风险
  risk_level: 中
  keywords:
  - 在途货物
  - 路货买卖
  - 合同成立时风险转移
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-607
  name: 需要运输标的物风险
  category: 风险转移
  title: 当事人没有约定交付地点或者约定不明确，标的物需要运输的，出卖人将标的物交付给第一承运人后，风险由买受人承担
  original_text: '第六百零七条 出卖人按照约定将标的物运送至买受人指定地点并交付给承运人后，标的物毁损、灭失的风险由买受人承担。

    当事人没有约定交付地点或者约定不明确，标的物需要运输的，出卖人将标的物交付给第一承运人后，标的物毁损、灭失的风险由买受人承担。

    '
  interpretation:
    core_principle: 货交第一承运人后风险转移
    key_points:
    - 约定交付地点的：运到指定地点交付承运人后风险转移
    - 未约定交付地点且需运输的：货交第一承运人后风险转移
    - 运输风险一般由买受人承担
  contract_review_tips: 需要运输的货物，建议购买运输保险，明确投保义务和受益人
  risk_level: 高
  keywords:
  - 需要运输
  - 第一承运人
  - 货交承运人
  - 运输风险
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-610
  name: 根本违约与风险承担
  category: 风险转移
  title: 因标的物不符合质量要求，致使不能实现合同目的的，买受人可以拒绝接受标的物或者解除合同
  original_text: '第六百一十条 因标的物不符合质量要求，致使不能实现合同目的的，买受人可以拒绝接受标的物或者解除合同。买受人拒绝接受标的物或者解除合同的，标的物毁损、灭失的风险由出卖人承担。

    '
  interpretation:
    core_principle: 根本违约时风险不转移
    key_points:
    - 质量不符构成根本违约的
    - 买受人可拒绝接受或解除合同
    - 风险仍由出卖人承担
    - 不影响主张违约责任
  contract_review_tips: 质量严重不符构成根本违约时，应及时拒绝收货并通知对方
  risk_level: 高
  keywords:
  - 质量不符
  - 根本违约
  - 拒绝接受
  - 解除合同
  - 风险不转移
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-620
  name: 标的物质量要求
  category: 质量责任
  title: 出卖人应当按照约定的质量要求交付标的物
  original_text: '第六百二十条 出卖人应当按照约定的质量要求交付标的物。出卖人提供有关标的物质量说明的，交付的标的物应当符合该说明的质量要求。

    '
  interpretation:
    core_principle: 标的物应符合约定质量标准和说明
    key_points:
    - 按约定质量要求交付
    - 提供质量说明的应符合说明
    - 质量说明构成合同内容
  contract_review_tips: 详细约定质量标准，卖方提供的质量说明应作为合同附件
  risk_level: 中
  keywords:
  - 质量要求
  - 质量标准
  - 质量说明
  - 标的物质量
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-617
  name: 质量不符违约责任
  category: 质量责任
  title: 出卖人交付的标的物不符合质量要求的，买受人可以依据本法第五百八十二条至第五百八十四条的规定请求承担违约责任
  original_text: '第六百一十七条 出卖人交付的标的物不符合质量要求的，买受人可以依据本法第五百八十二条至第五百八十四条的规定请求承担违约责任。

    '
  interpretation:
    core_principle: 质量不符应承担违约责任
    key_points:
    - 可请求修理、重作、更换、退货、减价等
    - 造成损失的可请求赔偿损失
    - 构成根本违约的可解除合同
  contract_review_tips: 明确约定质量不符的具体违约责任，包括维修、更换、退货、赔偿等
  risk_level: 高
  keywords:
  - 质量不符
  - 质量违约
  - 修理
  - 更换
  - 退货
  - 减价
  - 质量赔偿
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-626
  name: 价款支付时间
  category: 价款支付
  title: 买受人应当按照约定的数额和支付方式支付价款
  original_text: '第六百二十六条 买受人应当按照约定的数额和支付方式支付价款。对价款的数额和支付方式没有约定或者约定不明确的，适用本法第五百一十条、第五百一十一条第二项和第五项的规定。

    '
  interpretation:
    core_principle: 按约定支付价款，约定不明适用法定补充
    key_points:
    - 按约定数额和方式支付
    - 约定不明的按订立时履行地市场价
    - 支付方式不明的按有利于合同目的方式
  contract_review_tips: 明确约定价款金额、支付时间、支付方式、付款条件
  risk_level: 中
  keywords:
  - 价款支付
  - 支付方式
  - 支付数额
  - 市场价格
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-628
  name: 付款时间
  category: 价款支付
  title: 买受人应当按照约定的时间支付价款
  original_text: '第六百二十八条 买受人应当按照约定的时间支付价款。对支付时间没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定的，买受人应当在收到标的物或者提取标的物单证的同时支付。

    '
  interpretation:
    core_principle: 付款时间约定不明的，收货同时付款
    key_points:
    - 按约定时间支付
    - 约定不明的协议补充
    - 仍不能确定的，收货同时付款（一手交钱一手交货）
  contract_review_tips: 明确约定付款时间节点，避免约定不明导致货到即付款
  risk_level: 中
  keywords:
  - 付款时间
  - 支付时间
  - 收货同时付款
  - 同时履行
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-634
  name: 分期付款买卖解除
  category: 价款支付
  title: 分期付款的买受人未支付到期价款的数额达到全部价款的五分之一，经催告后在合理期限内仍未支付到期价款的，出卖人可以请求买受人支付全部价款或者解除合同
  original_text: '第六百三十四条 分期付款的买受人未支付到期价款的数额达到全部价款的五分之一，经催告后在合理期限内仍未支付到期价款的，出卖人可以请求买受人支付全部价款或者解除合同。

    出卖人解除合同的，可以向买受人请求支付该标的物的使用费。

    '
  interpretation:
    core_principle: 分期付款拖欠达到1/5的，出卖人可加速到期或解除合同
    key_points:
    - 未支付到期价款达到全部价款1/5
    - 经催告合理期限仍不支付
    - 出卖人可选择：请求支付全部价款，或解除合同
    - 解除合同的可请求支付使用费
  contract_review_tips: 分期付款合同应明确每期金额和支付时间，拖欠达1/5时及时催告
  risk_level: 高
  keywords:
  - 分期付款
  - 五分之一
  - 加速到期
  - 解除合同
  - 使用费
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-641
  name: 所有权保留
  category: 买卖合同
  title: 当事人可以在买卖合同中约定买受人未履行支付价款或者其他义务的，标的物的所有权属于出卖人
  original_text: '第六百四十一条 当事人可以在买卖合同中约定买受人未履行支付价款或者其他义务的，标的物的所有权属于出卖人。

    出卖人对标的物保留的所有权，未经登记，不得对抗善意第三人。

    '
  interpretation:
    core_principle: 可约定所有权保留，但需登记才对抗善意第三人
    key_points:
    - 可约定所有权保留（未付款前所有权归出卖人）
    - 保留所有权需登记才能对抗善意第三人
    - 未登记的，善意第三人可取得所有权
  contract_review_tips: 所有权保留条款应明确，重大标的物建议办理登记以对抗第三人
  risk_level: 高
  keywords:
  - 所有权保留
  - 保留所有权
  - 登记对抗
  - 善意第三人
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-642
  name: 出卖人取回权
  category: 买卖合同
  title: 当事人约定出卖人保留合同标的物的所有权，在标的物所有权转移前，买受人有法定情形的，出卖人有权取回标的物
  original_text: '第六百四十二条 当事人约定出卖人保留合同标的物的所有权，在标的物所有权转移前，买受人有下列情形之一，造成出卖人损害的，除当事人另有约定外，出卖人有权取回标的物：

    （一）未按照约定支付价款，经催告后在合理期限内仍未支付；

    （二）未按照约定完成特定条件；

    （三）将标的物出卖、出质或者作出其他不当处分。

    出卖人可以与买受人协商取回标的物；协商不成的，可以参照适用担保物权的实现程序。

    '
  interpretation:
    core_principle: 所有权保留情况下，出卖人享有取回权
    key_points:
    - 未按约定付款，经催告仍不付
    - 未完成约定条件
    - 不当处分标的物（出卖、出质等）
    - 协商不成可按担保物权实现程序处理
  contract_review_tips: 所有权保留合同应明确约定取回条件和程序
  risk_level: 高
  keywords:
  - 取回权
  - 所有权保留取回
  - 不当处分
  - 催告付款
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-621
  name: 质量要求约定不明的履行规则
  category: 验收条款
  title: 质量要求不明确的，按照强制性国家标准履行；没有强制性国家标准的，按照推荐性国家标准履行
  original_text: 当事人对标的物的质量要求没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定的，适用本法第五百一十一条第一项的规定。
  interpretation:
    core_principle: 质量标准从高原则，国家标准优先
    key_points:
    - 约定不明时，按强制性国家标准履行
    - 无强制性国家标准的，按推荐性国家标准
    - 仍无标准的，按行业标准
    - 最后才按通常标准或符合合同目的的特定标准
  contract_review_tips:
  - 合同必须明确约定验收标准，建议引用具体的国家标准编号
  - 若无明确约定，法律默认按强制性国家标准执行，可能高于供应商预期
  - 建议同时约定验收方法、流程和责任方
  risk_level: 中
  keywords:
  - 质量要求
  - 国家标准
  - 行业标准
  - 验收标准
  - 质量标准
  - 约定不明
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十一条
- id: CC-622
  name: 检验期限与异议通知
  category: 验收条款
  title: 买受人应当在检验期限内将标的物的数量或者质量不符合约定的情形通知出卖人，怠于通知视为符合约定
  original_text: 当事人约定检验期限的，买受人应当在检验期限内将标的物的数量或者质量不符合约定的情形通知出卖人。买受人怠于通知的，视为标的物的数量或者质量符合约定。
  interpretation:
    core_principle: 及时检验，怠于通知视为合格
    key_points:
    - 约定检验期的，必须在期限内提出异议
    - 怠于通知的，法律直接推定标的物合格
    - 异议必须是书面形式，建议明确异议内容
  contract_review_tips:
  - 检验期限不宜过短，应根据标的物性质合理设置
  - 必须明确异议提出方式和接收主体
  - 建议约定"视为验收合格"的具体情形和条件
  risk_level: 高
  keywords:
  - 检验期限
  - 验收期限
  - 异议通知
  - 怠于通知
  - 视为合格
  - 质量异议
  - 数量异议
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十二条
- id: CC-623
  name: 检验期限过短的特殊规则
  category: 验收条款
  title: 约定的检验期限过短，难以完成全面检验的，该期限视为对外观瑕疵提出异议的期限
  original_text: 当事人约定的检验期限过短，根据标的物的性质和交易习惯，买受人在检验期限内难以完成全面检验的，该期限仅视为买受人对外观瑕疵提出异议的期限。约定的检验期限或者质量保证期短于法律、行政法规规定期限的，应当以法律、行政法规规定的期限为准。
  interpretation:
    core_principle: 保护买受人合理检验权，过短期限仅适用于外观瑕疵
    key_points:
    - 过短的检验期不等于质量异议期
    - 隐蔽瑕疵的检验期不受约定过短期限限制
    - 法定期限优先于约定期限
  contract_review_tips:
  - 设备类合同检验期应区分外观验收和质量验收（如试运行验收）
  - 约定检验期时应区分"外观验收期"和"质量异议期"
  - 隐蔽瑕疵的检验期建议约定为验收合格后6-12个月
  risk_level: 中
  keywords:
  - 检验期限过短
  - 外观瑕疵
  - 隐蔽瑕疵
  - 质量异议期
  - 质量保证期
  - 法定期限
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十三条
- id: CC-624
  name: 隐蔽瑕疵检验义务
  category: 验收条款
  title: 当事人没有约定检验期限的，买受人应当在发现或者应当发现标的物的数量或者质量不符合约定的合理期限内通知
  original_text: 当事人没有约定检验期限的，买受人应当在发现或者应当发现标的物的数量或者质量不符合约定的合理期限内通知出卖人。买受人在合理期限内未通知或者自收到标的物之日起二年内未通知出卖人的，视为标的物的数量或者质量符合约定；但是，对标的物有质量保证期的，适用质量保证期，不适用该二年的规定。
  interpretation:
    core_principle: 未约定检验期的，2年最长异议期，有质保期的按质保期
    key_points:
    - 无约定时，合理期限内必须提异议
    - 最长不超过自收到标的物之日起2年
    - 有质量保证期的，按质保期执行，不受2年限制
  contract_review_tips:
  - 必须明确约定质量保证期，建议不少于12个月
  - 重大设备项目建议约定验收后12个月质保期
  - 质保期内发现隐蔽瑕疵的，应及时书面通知
  risk_level: 高
  keywords:
  - 隐蔽瑕疵
  - 合理期限
  - 二年异议期
  - 质量保证期
  - 未约定检验期
  - 质量异议
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十四条
- id: CC-625
  name: 出卖人单证资料交付义务
  category: 验收条款
  title: 出卖人应当按照约定或者交易习惯向买受人交付提取标的物单证以外的有关单证和资料
  original_text: 出卖人应当按照约定或者交易习惯向买受人交付提取标的物单证以外的有关单证和资料。
  interpretation:
    core_principle: 出卖人不仅要交付标的物，还要交付完整的单证资料
    key_points:
    - 应当交付的单证包括产品合格证、使用说明书、保修卡、报关单、检验检疫证明等
    - 不交付单证资料影响验收的，视为未完全履行交付义务
  contract_review_tips:
  - 合同应明确约定验收所需的全部单证资料清单
  - 交付资料不完整的，买方有权拒绝验收或要求补充
  - 进口产品应特别约定交付中文说明书和报关完税证明
  risk_level: 低
  keywords:
  - 单证资料
  - 交付资料
  - 产品合格证
  - 使用说明书
  - 保修卡
  - 检验报告
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十五条
- id: CC-615
  name: 标的物瑕疵担保义务
  category: 售后条款
  title: 出卖人应当按照约定的质量要求交付标的物，提供有关标的物质量说明的，交付的标的物应当符合该说明的质量要求
  original_text: 出卖人应当按照约定的质量要求交付标的物。出卖人提供有关标的物质量说明的，交付的标的物应当符合该说明的质量要求。
  interpretation:
    core_principle: 出卖人对标的物质量负瑕疵担保责任
    key_points:
    - 标的物必须符合约定的质量标准
    - 出卖人提供的质量说明对出卖人有约束力
    - 样品买卖的，样品质量就是标的物质量标准
  contract_review_tips:
  - 合同应明确约定质量标准和验收方法
  - 出卖人提供的产品说明书、宣传资料可作为质量要求的一部分
  - 样品买卖的，样品应双方封存并作为合同附件
  risk_level: 中
  keywords:
  - 瑕疵担保
  - 质量要求
  - 质量说明
  - 质量保证
  - 产品说明书
  - 质量标准
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百一十五条
- id: CC-616
  name: 权利瑕疵担保义务
  category: 售后条款
  title: 出卖人就交付的标的物，负有保证第三人不得向买受人主张任何权利的义务
  original_text: 出卖人就交付的标的物，负有保证第三人不得向买受人主张任何权利的义务，但是法律另有规定的除外。买受人订立合同时知道或者应当知道第三人对买卖的标的物享有权利的，出卖人不承担前条规定的义务。
  interpretation:
    core_principle: 出卖人保证标的物所有权完整，无权利负担
    key_points:
    - 所有权完整，无抵押、质押、查封等权利限制
    - 无侵犯知识产权情形
    - 买受人明知有权利瑕疵的，出卖人免责
  contract_review_tips:
  - 重要资产买卖合同应做尽职调查，确认权利无瑕疵
  - 软件/技术类合同应明确知识产权归属和授权范围
  - 应约定出卖人承担因权利瑕疵引起的全部赔偿责任
  risk_level: 高
  keywords:
  - 权利瑕疵
  - 所有权
  - 第三人主张权利
  - 抵押
  - 质押
  - 查封
  - 知识产权
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百一十六条
- id: CC-617-A
  name: 质量不符违约责任（售后适用）
  category: 售后条款
  title: 标的物质量不符合约定的，买受人可以要求承担修理、更换、重作、退货、减少价款等违约责任
  original_text: 出卖人交付的标的物不符合质量要求的，买受人可以依据本法第五百八十二条至第五百八十四条的规定请求承担违约责任。
  interpretation:
    core_principle: 质量不符的，买受人可选择多种违约救济方式
    key_points:
    - 修理、更换、重作
    - 退货、解除合同
    - 减少价款、赔偿损失
    - 救济方式由买受人选择
  contract_review_tips:
  - 应明确约定质量不符时的具体救济方式和时限
  - 建议约定"先更换/维修，无法解决的退货"的递进救济方案
  - 应明确更换/维修的响应时限和完成时限
  risk_level: 高
  keywords:
  - 质量不符
  - 修理
  - 更换
  - 重作
  - 退货
  - 减少价款
  - 维修义务
  - 售后服务
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百一十七条
- id: CC-618
  name: 质量保证期规则
  category: 售后条款
  title: 出卖人应按约定的质量保证期承担保修义务，买受人在质保期内发现瑕疵的，有权要求修理、更换
  original_text: 当事人约定检验期限的，买受人应当在检验期限内将标的物的数量或者质量不符合约定的情形通知出卖人。买受人怠于通知的，视为标的物的数量或者质量符合约定。（本条与检验期限结合，质保期为出卖人承担免费维修责任的期间）
  interpretation:
    core_principle: 质保期内出卖人负免费维修、更换等保修义务
    key_points:
    - 质保期是出卖人承诺的质量保障期间
    - 质保期内发现质量问题的，出卖人负免费维修责任
    - 质保期自验收合格之日起计算
  contract_review_tips:
  - 必须明确约定质量保证期的起算时间和期限
  - 设备类合同建议约定验收合格后至少12个月质保期
  - 应明确质保期内的响应时间（如48小时到场）和维修时限
  risk_level: 中
  keywords:
  - 质量保证期
  - 质保期
  - 保修期
  - 保修义务
  - 免费维修
  - 质量保障
  - 三包
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十二条质保相关解释
- id: CC-629
  name: 多交标的物处理
  category: 验收条款
  title: 出卖人多交标的物的，买受人可以接收或者拒绝接收多交的部分。接收多交部分的，按照约定的价格支付价款；拒绝接收的，应当及时通知出卖人
  original_text: 出卖人多交标的物的，买受人可以接收或者拒绝接收多交的部分。买受人接收多交部分的，按照约定的价格支付价款；买受人拒绝接收多交部分的，应当及时通知出卖人。
  interpretation:
    core_principle: 买受人有选择权，拒绝接收负有及时通知义务
    key_points:
    - 可以选择全部接收并按合同价格付款
    - 可以选择只接收约定数量，拒绝多交部分
    - 拒绝接收的，负有及时通知义务
  contract_review_tips:
  - 验收时应准确核对数量
  - 发现多交的应及时书面通知出卖人处理方案
  - 接收多交部分的按原合同价格付款，不得擅自提高价格
  risk_level: 低
  keywords:
  - 多交标的物
  - 多交货
  - 数量不符
  - 接收多交
  - 拒绝接收
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第六百二十九条
- id: CC-595-1
  name: 买卖合同标的条款
  category: 合同标的
  title: 买卖合同标的必须明确具体，包括标的物名称、品种、规格、型号、等级、花色等信息
  original_text: 买卖合同是出卖人转移标的物的所有权于买受人，买受人支付价款的合同。（标的条款为核心条款，需明确具体）
  interpretation:
    core_principle: 合同标的是合同成立的必要条款，必须明确具体
    key_points:
    - 标的物名称必须使用规范全称，避免使用简称或俗称
    - 规格型号应具体到可唯一识别的程度
    - 品牌、生产厂家应明确约定
    - 计量单位应采用法定计量单位
  contract_review_tips:
  - 合同标的条款必须完整包含：名称、品牌、规格型号、数量、计量单位
  - 设备采购合同应附详细的设备配置清单作为附件
  - 技术参数应作为独立附件，双方签字确认
  risk_level: 高
  keywords:
  - 标的物
  - 标的
  - 产品名称
  - 规格型号
  - 品牌
  - 数量
  - 计量单位
  - 配置清单
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第五百九十五条标的条款解释
- id: CC-596-1
  name: 买卖合同标的条款必备要素
  category: 合同标的
  title: 买卖合同条款一般包括标的物的名称、数量、质量、价款、履行期限、履行地点和方式等
  original_text: 买卖合同的内容一般包括标的物的名称、数量、质量、价款、履行期限、履行地点和方式、包装方式、检验标准和方法、结算方式、合同使用的文字及其效力等条款。
  interpretation:
    core_principle: 8大必备条款，缺一影响合同履行
    key_points:
    - 标的名称、数量、质量是标的条款三要素
    - 价款、履行期限是核心商务条款
    - 检验标准和方法是验收依据
    - 包装方式关系到运输和交付安全
  contract_review_tips:
  - 标的条款建议采用表格形式列出，清晰明了
  - 质量标准应引用具体的国家标准/行业标准编号
  - 包装方式应明确具体（如防潮、防震、防静电等）
  risk_level: 中
  keywords:
  - 合同条款
  - 必备条款
  - 标的名称
  - 数量
  - 质量
  - 包装方式
  - 检验标准
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第五百九十六条
