# ==============================================
# OpenClaw Prometheus 监控配置 v1.0
# ==============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'openclaw-monitor'

# 告警规则配置
rule_files:
  - 'alerts/*.yml'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # --------------------------
  # OpenClaw 主服务指标
  # --------------------------
  - job_name: 'openclaw'
    static_configs:
      - targets: ['openclaw:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # --------------------------
  # 系统资源监控
  # --------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # --------------------------
  # Prometheus 自身监控
  # --------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

