# 合同法规知识库 - 查询配置文件
# 版本: v1.0
# 更新日期: 2026-04-24

# =============================================================================
# 关键词匹配权重配置
# =============================================================================
keyword_weights:
  exact_match: 100          # 精确匹配权重
  partial_match: 50         # 部分匹配权重
  fuzzy_match: 30           # 模糊匹配权重
  category_bonus: 20        # 分类匹配额外加分
  title_bonus: 15           # 标题匹配额外加分

# =============================================================================
# 风险评分规则
# =============================================================================
risk_scoring:
  high_risk_threshold: 40    # 高风险阈值（低于此分为高风险）
  medium_risk_threshold: 70  # 中风险阈值（低于此分为中风险）
  base_score: 100            # 基础分（满分）
  
  # 风险扣分规则
  penalty_rules:
    high_risk_article: -30    # 触及高风险法条
    medium_risk_article: -15  # 触及中风险法条
    low_risk_article: -5      # 触及低风险法条
    multiple_violations: -10  # 多项违规额外扣分

# =============================================================================
# 审查提示配置
# =============================================================================
review_tips:
  enable_auto_suggestion: true
  max_risk_items: 5
  min_match_score: 30        # 最低匹配分数（低于此不显示）
  show_keyword_hits: true    # 显示匹配的关键词
  
# =============================================================================
# 分类定义
# =============================================================================
categories:
  - 合同履行
  - 合同效力
  - 合同订立
  - 合同变更
  - 合同转让
  - 合同解除
  - 合同终止
  - 违约责任
  - 损失赔偿
  - 违约金
  - 定金
  - 不可抗力
  - 买卖合同
  - 风险转移
  - 质量责任
  - 价款支付
  - 交付义务

# =============================================================================
# 风险等级定义
# =============================================================================
risk_level_definitions:
  high:
    label: "高"
    color: "red"
    description: "可能导致重大法律风险，必须审查"
    action_required: "强烈建议修改"
  
  medium:
    label: "中"
    color: "yellow"
    description: "存在一定法律风险，需要关注"
    action_required: "建议评估修改"
  
  low:
    label: "低"
    color: "green"
    description: "轻微风险或合规提示"
    action_required: "可根据情况调整"

# =============================================================================
# 数据文件路径
# =============================================================================
data_sources:
  civil_code:
    contract_general: "data/civil-code/contract-general.yaml"
    contract_sale: "data/civil-code/contract-sale.yaml"
