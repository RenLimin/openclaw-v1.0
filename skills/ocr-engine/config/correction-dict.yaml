# -----------------------------------------------------------------------------
# 重复字符噪音模式（aaaaa、|||||、::::::等OCR识别垃圾）
# -----------------------------------------------------------------------------
repeated_noise_patterns:
  # 连续4个以上相同字符的噪音模式
  - '[a-z]{4,}'  # 连续小写字母（aaaaa）
  - '[|]{4,}'     # 连续竖线（|||||）
  - '[:]{4,}'     # 连续冒号（::::::）
  - '[=]{4,}'     # 连续等号（=====）
  - '[-]{4,}'     # 连续横杠（-----）
  - '[.]{5,}'     # 连续点号（.......）
  - '[x]{4,}'     # 连续x（xxxxx）

