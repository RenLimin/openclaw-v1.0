# ==============================================
# OpenClaw 开发环境配置 v1.0
# ==============================================

env: development
log_level: DEBUG

# 服务配置
service:
  name: openclaw-dev
  port: 8080
  host: 0.0.0.0

# LLM 配置（开发环境可使用更便宜的模型）
llm:
  provider: openai
  model: gpt-3.5-turbo
  temperature: 0.7
  max_tokens: 2000

# 功能开关
features:
  auto_backup: false
  monitoring_enabled: true
  evolution_engine: true
  verbose_logging: true

# 路径配置
paths:
  config_dir: ./core-config
  memory_dir: ./memory
  knowledge_dir: ./knowledge-base
  data_dir: ./data

