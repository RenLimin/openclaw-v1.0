# Word 文档结构解析规则
# ====================================
# 配置驱动的标题识别、格式规则、提取规则

# -----------------------------------------------------------------------------
# 1. 标题识别规则
# -----------------------------------------------------------------------------
heading_patterns:
  # 中文标题格式
  level_1:
    - "^第[一二三四五六七八九十百千\\d]+章\\s"
    - "^第[一二三四五六七八九十百千\\d]+编\\s"
    - "^第[一二三四五六七八九十百千\\d]+部分\\s"
  level_2:
    - "^第[一二三四五六七八九十百千\\d]+条\\s"
    - "^第[一二三四五六七八九十百千\\d]+节\\s"
    - "^\\d+\\.\\s"
    - "^\\d+、\\s"
  level_3:
    - "^\\d+\\.\\d+\\s"
    - "^[（(][一二三四五六七八九十\\d]+[）)]\\s*"
  level_4:
    - "^\\d+\\.\\d+\\.\\d+\\s"
    - "^[一二三四五六七八九十]{1,2}[、．.]\\s*"
  level_5:
    - "^\\d+\\.\\d+\\.\\d+\\.\\d+\\s"

# -----------------------------------------------------------------------------
# 2. 字体格式规则
# -----------------------------------------------------------------------------
font_rules:
  # 正文字体规则
  body:
    allowed_fonts: ["宋体", "SimSun", "Times New Roman"]
    allowed_sizes: [10.5, 11, 12]  # 磅值
    line_spacing: 1.5  # 倍行距
    bold: false
    italic: false

  # 一级标题规则
  heading_1:
    allowed_fonts: ["黑体", "SimHei", "微软雅黑", "Microsoft YaHei"]
    allowed_sizes: [14, 16, 18, 20, 22]
    bold: true
    space_before: 12  # 段前距（磅）
    space_after: 6   # 段后距（磅）

  # 二级标题规则
  heading_2:
    allowed_fonts: ["黑体", "SimHei", "微软雅黑", "Microsoft YaHei"]
    allowed_sizes: [12, 14, 16]
    bold: true
    space_before: 6
    space_after: 3

  # 三级标题规则
  heading_3:
    allowed_fonts: ["黑体", "SimHei", "宋体", "SimSun"]
    allowed_sizes: [12, 14]
    bold: true
    space_before: 3
    space_after: 3

  # 表格内容规则
  table_content:
    allowed_fonts: ["宋体", "SimSun"]
    allowed_sizes: [9, 10, 10.5, 11]

# -----------------------------------------------------------------------------
# 3. 表格解析规则
# -----------------------------------------------------------------------------
table_rules:
  # 表头识别
  header_detection:
    # 表头可能的位置（前N行）
    max_header_rows: 3
    # 表头特征关键词
    header_keywords: ["序号", "编号", "名称", "项目", "内容", "说明", "备注", "日期", "金额", "数量"]
    # 表头字体通常加粗
    header_bold: true

  # 跨页表格合并
  cross_page_merge:
    enabled: true
    # 判断连续表格的阈值（行间距小于此值认为是同一表格）
    max_gap_lines: 2
    # 表头重复识别（跨页表格通常表头重复）
    detect_duplicate_headers: true

  # 合并单元格处理
  merged_cells:
    # 填充方式：repeat / empty / first_only
    fill_mode: "repeat"

# -----------------------------------------------------------------------------
# 4. 目录（TOC）规则
# -----------------------------------------------------------------------------
toc_rules:
  # 目录位置关键词
  toc_location_keywords: ["目录", "目次", "Contents"]
  # 目录最大搜索位置（文档前N行）
  max_search_lines: 50
  # 页码分隔符
  page_separators: ["\\.{2,}", "\\s{2,}", "\\t+"]
  # 目录层级深度
  max_level: 4

# -----------------------------------------------------------------------------
# 5. 内容提取规则
# -----------------------------------------------------------------------------
extract_rules:
  # 跳过空行
  skip_empty_lines: true
  # 最小段落长度（字符数）
  min_paragraph_length: 2
  # 保留段落格式信息
  preserve_formatting: true
  # 自动合并相邻同样式段落
  merge_same_style: false
