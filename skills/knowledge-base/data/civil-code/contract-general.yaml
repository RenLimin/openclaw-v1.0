description: 民法典合同编-通则章节 + 合同形式审查专项规则
version: '1.1'
updated: '2026-04-24'
articles:
- id: FORM-001
  name: 合同主体完整性审查规则
  category: 合同形式审查
  title: 合同双方主体信息必须完整准确，与营业执照/公章信息一致
  original_text: 《民法典》第465条：依法成立的合同，受法律保护。合同主体是合同权利义务的承担者，主体信息不完整或错误将直接影响合同效力和执行。
  interpretation:
    core_principle: 主体明确是合同成立的首要前提
    key_points:
    - 合同主体名称必须与营业执照/身份证/公章完全一致
    - 统一社会信用代码/证件号码必须完整填写
    - 法定代表人/负责人/授权代表信息完整
    - 注册地址与通讯地址应分别明确
    - 联系方式（电话、邮箱）必须有效
  contract_review_tips:
  - 必须核对签约主体营业执照原件或工商查询信息
  - 名称中有括号的注意区分全角半角
  - 分支机构签约的必须核实总公司授权
  - 个人签约必须核对身份证正反面
  risk_level: 高
  keywords:
  - 合同主体
  - 甲方
  - 乙方
  - 营业执照
  - 统一社会信用代码
  - 法定代表人
  - 授权代表
  - 公章
  - 主体资格
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第465条
- id: FORM-002
  name: 合同签订日期审查规则
  category: 合同形式审查
  title: 合同签订日期必须完整明确，双方日期逻辑一致
  original_text: 《民法典》第490条：当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立。
  interpretation:
    core_principle: 签订日期影响合同成立时间、履行期限、诉讼时效计算
    key_points:
    - 签订日期必须完整填写年月日，不得空白
    - 双方签订日期不一致的以后签字日期为成立日
    - 签订日期不得早于主体成立日期
    - 倒签合同需特别标注并履行内部审批
  contract_review_tips:
  - 空白日期合同一律退回补充
  - 日期为手写的需核对是否有涂改痕迹
  - 履行起始日期不得早于签订日期
  - 倒签合同必须附上情况说明和审批记录
  risk_level: 中
  keywords:
  - 签订日期
  - 合同成立
  - 签署日期
  - 年月日
  - 倒签
  - 签订时间
  - 生效日期
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第490条
- id: FORM-003
  name: 合同生效条款审查规则
  category: 合同形式审查
  title: 合同生效条件必须明确具体，无歧义无冲突
  original_text: 《民法典》第502条：依法成立的合同，自成立时生效，但是法律另有规定或者当事人另有约定的除外。
  interpretation:
    core_principle: 生效条件决定权利义务开始时间，必须清晰无歧义
    key_points:
    - 一般生效：签字盖章之日起生效
    - 附条件生效：条件必须明确可验证（如付款后生效、审批后生效）
    - 附期限生效：期限必须具体到年月日
    - 多条件生效需明确是全部满足还是满足其一
  contract_review_tips:
  - 避免使用"双方权利义务履行完毕后生效"等循环定义
  - 附条件生效的必须约定条件未达成时的处理方案
  - 需要行政审批的合同必须明确审批主体和时限
  - 生效条款必须与合同其他条款无冲突
  risk_level: 中
  keywords:
  - 生效条款
  - 生效条件
  - 生效日期
  - 附条件生效
  - 附期限生效
  - 审批生效
  - 签字盖章生效
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第502条
- id: FORM-004
  name: 签字盖章有效性审查规则
  category: 合同形式审查
  title: 签字盖章是合同成立的法定要件，必须合法有效
  original_text: 《民法典》第490条：当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立。在签名、盖章或者按指印之前，当事人一方已经履行主要义务，对方接受时，该合同成立。
  interpretation:
    core_principle: 签字盖章决定合同成立与效力，必须严格审查
    key_points:
    - 公章/合同专用章必须与合同主体名称完全一致
    - 多页合同必须加盖骑缝章或每页签字确认
    - 签字人必须是法定代表人或持有效授权委托书的代表
    - 电子签章必须符合电子签名法规定
  contract_review_tips:
  - 合同主体名称与印章名称不一致的必须退回重签
  - 持授权委托书签约的必须留存授权书原件
  - 骑缝章必须覆盖所有页面边缘
  - 电子签章必须验证证书有效性和签名时间
  risk_level: 高
  keywords:
  - 签字盖章
  - 公章
  - 合同专用章
  - 骑缝章
  - 法定代表人签字
  - 授权委托书
  - 电子签章
  - 印章
  version: '1.0'
  updated: '2026-04-24'
  source: 中华人民共和国民法典第490条、电子签名法
- id: FORM-005
  name: 合同版本与编号管理规则
  category: 合同形式审查
  title: 合同编号唯一可追溯，版本号清晰，附件完整关联
  original_text: 合同管理规范：合同编号、版本管理是合同全生命周期管理的基础，确保版本一致是避免争议的基本要求。
  interpretation:
    core_principle: 版本混乱是合同争议高发原因，必须建立统一编号和版本管理规则
    key_points:
    - 合同编号必须遵循公司统一规则，唯一可追溯
    - 版本号标注清晰（V1.0/V2.0/V3.0等）
    - 合同附件必须列出完整清单并标注对应版本
    - 附件与正文必须有明确的引用关联
  contract_review_tips:
  - 检查合同编号是否符合编号规则
  - 多版本合同必须确认最终签约版本号
  - 附件清单必须与实际附件一一对应
  - 引用外部文件作为附件的必须注明文件标识和版本
  risk_level: 低
  keywords:
  - 合同编号
  - 版本号
  - 附件清单
  - 版本管理
  - 附件
  - 附录
  - 附表
  version: '1.0'
  updated: '2026-04-24'
  source: 企业合同管理规范
- id: CC-465
  name: 合同定义
  category: 合同订立
  title: 合同是民事主体之间设立、变更、终止民事法律关系的协议
  original_text: '第四百六十五条 依法成立的合同，受法律保护。

    依法成立的合同，仅对当事人具有法律约束力，但是法律另有规定的除外。

    '
  interpretation:
    core_principle: 合同相对性原则
    key_points:
    - 依法成立的合同受法律保护
    - 合同仅对当事人具有法律约束力（合同相对性）
    - 法律另有规定的可突破合同相对性
  contract_review_tips: 审查合同主体是否适格，是否具有相应民事行为能力
  risk_level: 中
  keywords:
  - 合同成立
  - 法律约束力
  - 合同相对性
  - 当事人
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-490
  name: 合同成立时间
  category: 合同订立
  title: 当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立
  original_text: '第四百九十条 当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立。在签名、盖章或者按指印之前，当事人一方已经履行主要义务，对方接受时，该合同成立。

    法律、行政法规规定或者当事人约定合同应当采用书面形式订立，当事人未采用书面形式但是一方已经履行主要义务，对方接受时，该合同成立。

    '
  interpretation:
    core_principle: 实际履行优于形式要求
    key_points:
    - 签名、盖章、按指印三选一即可
    - 履行主要义务且对方接受的，合同成立
    - 书面形式要求可因实际履行而补正
  contract_review_tips: 确保合同签署完整，注意实际履行可能导致合同成立的风险
  risk_level: 中
  keywords:
  - 签名
  - 盖章
  - 按指印
  - 合同成立
  - 实际履行
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-491
  name: 电子合同成立时间
  category: 合同订立
  title: 电子合同自提交订单成功时成立
  original_text: '第四百九十一条 当事人采用信件、数据电文等形式订立合同要求签订确认书的，签订确认书时合同成立。

    当事人一方通过互联网等信息网络发布的商品或者服务信息符合要约条件的，对方选择该商品或者服务并提交订单成功时合同成立，但是当事人另有约定的除外。

    '
  interpretation:
    core_principle: 电子合同提交订单即成立
    key_points:
    - 电商平台提交订单成功时合同成立
    - 当事人可另行约定成立条件
    - 发布信息符合要约条件的即构成要约
  contract_review_tips: 电商合同应明确订单提交与合同成立的关系
  risk_level: 低
  keywords:
  - 电子合同
  - 提交订单
  - 确认书
  - 电子商务
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-502
  name: 合同生效时间
  category: 合同效力
  title: 依法成立的合同，自成立时生效
  original_text: '第五百零二条 依法成立的合同，自成立时生效，但是法律另有规定或者当事人另有约定的除外。

    依照法律、行政法规的规定，合同应当办理批准等手续生效的，依照其规定。未办理批准等手续影响合同生效的，不影响合同中履行报批等义务条款以及相关条款的效力。应当办理申请批准等手续的当事人未履行义务的，对方可以请求其承担违反该义务的责任。

    '
  interpretation:
    core_principle: 成立即生效为原则，特殊规定为例外
    key_points:
    - 原则上合同成立即生效
    - 批准生效合同，报批条款独立有效
    - 未履行报批义务应承担违约责任
  contract_review_tips: 需要批准生效的合同，应明确约定报批义务及违约责任
  risk_level: 中
  keywords:
  - 合同生效
  - 批准
  - 报批义务
  - 生效条件
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-504
  name: 越权代表合同效力
  category: 合同效力
  title: 法人的法定代表人或者非法人组织的负责人超越权限订立的合同相对人善意的有效
  original_text: '第五百零四条 法人的法定代表人或者非法人组织的负责人超越权限订立的合同，除相对人知道或者应当知道其超越权限外，该代表行为有效，订立的合同对法人或者非法人组织发生效力。

    '
  interpretation:
    core_principle: 表见代表制度保护善意相对人
    key_points:
    - 相对人善意的，越权代表行为有效
    - 相对人明知或应知越权的，合同可能无效
    - 表见代表无需法人追认即有效
  contract_review_tips: 重要合同应要求对方提供授权文件，核实签约人权限
  risk_level: 高
  keywords:
  - 越权代表
  - 法定代表人
  - 表见代表
  - 善意相对人
  - 授权
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-505
  name: 超越经营范围合同效力
  category: 合同效力
  title: 当事人超越经营范围订立的合同的效力，不得仅以超越经营范围确认合同无效
  original_text: '第五百零五条 当事人超越经营范围订立的合同的效力，应当依照本法第一编第六章第三节和本编的有关规定确定，不得仅以超越经营范围确认合同无效。

    '
  interpretation:
    core_principle: 经营范围不影响合同效力
    key_points:
    - 超越经营范围不必然导致合同无效
    - 仍需根据民事法律行为效力规则判断
    - 违反限制经营、特许经营规定的可能无效
  contract_review_tips: 不得仅因对方超越经营范围而主张合同无效
  risk_level: 低
  keywords:
  - 经营范围
  - 越权经营
  - 合同效力
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-509
  name: 全面履行义务
  category: 合同履行
  title: 当事人应当按照约定全面履行自己的义务
  original_text: '第五百零九条 当事人应当按照约定全面履行自己的义务。

    当事人应当遵循诚信原则，根据合同的性质、目的和交易习惯履行通知、协助、保密等义务。

    当事人在履行合同过程中，应当避免浪费资源、污染环境和破坏生态。

    '
  interpretation:
    core_principle: 全面履行+诚信履行+绿色履行
    key_points:
    - 按约定全面履行（主给付义务）
    - 诚信履行附随义务（通知、协助、保密）
    - 绿色履行原则（避免浪费、污染、破坏生态）
  contract_review_tips: 合同不仅要履行主义务，还要履行通知、协助、保密等附随义务
  risk_level: 中
  keywords:
  - 全面履行
  - 诚信原则
  - 附随义务
  - 通知
  - 协助
  - 保密
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-510
  name: 约定不明的履行规则
  category: 合同履行
  title: 合同内容约定不明确的适用补充解释规则
  original_text: '第五百一十条 合同生效后，当事人就质量、价款或者报酬、履行地点等内容没有约定或者约定不明确的，可以协议补充；不能达成补充协议的，按照合同相关条款或者交易习惯确定。

    '
  interpretation:
    core_principle: 补充协议优先，其次条款解释，最后交易习惯
    key_points:
    - 首先协议补充
    - 其次按合同相关条款解释
    - 最后按交易习惯确定
  contract_review_tips: 重要条款应明确约定，避免约定不明产生争议
  risk_level: 中
  keywords:
  - 约定不明
  - 补充协议
  - 交易习惯
  - 合同解释
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-511
  name: 约定不明的法定补充规则
  category: 合同履行
  title: 当事人就有关合同内容约定不明确，依据前条规定仍不能确定的，适用下列规定
  original_text: '第五百一十一条 当事人就有关合同内容约定不明确，依据前条规定仍不能确定的，适用下列规定：

    （一）质量要求不明确的，按照强制性国家标准履行；没有强制性国家标准的，按照推荐性国家标准履行；没有推荐性国家标准的，按照行业标准履行；没有国家标准、行业标准的，按照通常标准或者符合合同目的的特定标准履行。

    （二）价款或者报酬不明确的，按照订立合同时履行地的市场价格履行；依法应当执行政府定价或者政府指导价的，依照规定履行。

    （三）履行地点不明确，给付货币的，在接受货币一方所在地履行；交付不动产的，在不动产所在地履行；其他标的，在履行义务一方所在地履行。

    （四）履行期限不明确的，债务人可以随时履行，债权人也可以随时请求履行，但是应当给对方必要的准备时间。

    （五）履行方式不明确的，按照有利于实现合同目的的方式履行。

    （六）履行费用的负担不明确的，由履行义务一方负担；因债权人原因增加的履行费用，由债权人负担。

    '
  interpretation:
    core_principle: 法定补充规则确保合同可履行
    key_points:
    - 质量：国标→行标→通常标准
    - 价款：订立时履行地市场价
    - 履行地：货币在收款方，不动产在所在地
    - 履行期限：可随时履行但应给准备时间
  contract_review_tips: 质量、价款、履行地、期限是核心条款，务必明确约定
  risk_level: 中
  keywords:
  - 质量标准
  - 价款
  - 履行地点
  - 履行期限
  - 履行方式
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-535
  name: 债权人代位权
  category: 合同保全
  title: 因债务人怠于行使其债权影响债权人到期债权实现的，债权人可以代位行使
  original_text: '第五百三十五条 因债务人怠于行使其债权或者与该债权有关的从权利，影响债权人的到期债权实现的，债权人可以向人民法院请求以自己的名义代位行使债务人对相对人的权利，但是该权利专属于债务人自身的除外。

    代位权的行使范围以债权人的到期债权为限。债权人行使代位权的必要费用，由债务人负担。

    '
  interpretation:
    core_principle: 债权人可代位行使债务人权利以保全债权
    key_points:
    - 债务人怠于行使债权
    - 影响债权人到期债权实现
    - 非专属于债务人自身的权利
    - 以债权人债权为限
  contract_review_tips: 债务人无力偿债时，可考虑行使代位权向次债务人追偿
  risk_level: 中
  keywords:
  - 代位权
  - 怠于行使
  - 到期债权
  - 次债务人
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-538
  name: 债权人撤销权
  category: 合同保全
  title: 债务人以放弃其债权等方式无偿处分财产权益影响债权人债权实现的，债权人可以撤销
  original_text: '第五百三十八条 债务人以放弃其债权、放弃债权担保、无偿转让财产等方式无偿处分财产权益，或者恶意延长其到期债权的履行期限，影响债权人的债权实现的，债权人可以请求人民法院撤销债务人的行为。

    '
  interpretation:
    core_principle: 债权人可撤销债务人无偿处分财产行为
    key_points:
    - 放弃债权、无偿转让等无偿处分
    - 恶意延长到期债权履行期限
    - 影响债权人债权实现
    - 需通过法院行使撤销权
  contract_review_tips: 发现债务人无偿转移财产时，及时行使撤销权
  risk_level: 中
  keywords:
  - 撤销权
  - 无偿转让
  - 放弃债权
  - 财产处分
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-543
  name: 合同变更
  category: 合同变更
  title: 当事人协商一致，可以变更合同
  original_text: '第五百四十三条 当事人协商一致，可以变更合同。

    '
  interpretation:
    core_principle: 合同变更需双方协商一致
    key_points:
    - 必须双方协商一致
    - 变更内容应明确
    - 变更最好采用书面形式
  contract_review_tips: 合同变更应签订书面补充协议，明确变更内容
  risk_level: 低
  keywords:
  - 合同变更
  - 协商一致
  - 补充协议
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-545
  name: 债权转让
  category: 合同转让
  title: 债权人可以将债权的全部或者部分转让给第三人
  original_text: '第五百四十五条 债权人可以将债权的全部或者部分转让给第三人，但是有下列情形之一的除外：

    （一）根据债权性质不得转让；

    （二）按照当事人约定不得转让；

    （三）依照法律规定不得转让。

    当事人约定非金钱债权不得转让的，不得对抗善意第三人。当事人约定金钱债权不得转让的，不得对抗第三人。

    '
  interpretation:
    core_principle: 债权原则上可自由转让，例外情形除外
    key_points:
    - 金钱债权约定不得转让不能对抗第三人
    - 非金钱债权不得转让不能对抗善意第三人
    - 债权转让无需债务人同意，但需通知
  contract_review_tips: 限制债权转让的约定对金钱债权效力有限
  risk_level: 中
  keywords:
  - 债权转让
  - 债权让与
  - 不得转让
  - 金钱债权
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-546
  name: 债权转让通知义务
  category: 合同转让
  title: 债权人转让债权，未通知债务人的，该转让对债务人不发生效力
  original_text: '第五百四十六条 债权人转让债权，未通知债务人的，该转让对债务人不发生效力。

    债权转让的通知不得撤销，但是经受让人同意的除外。

    '
  interpretation:
    core_principle: 债权转让需通知债务人才对其生效
    key_points:
    - 未通知债务人的，转让对债务人不生效
    - 债务人可继续向原债权人履行
    - 通知不得单方撤销
  contract_review_tips: 债权转让必须及时通知债务人，保留通知证据
  risk_level: 高
  keywords:
  - 债权转让
  - 通知义务
  - 转让通知
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-551
  name: 债务转移
  category: 合同转让
  title: 债务人将债务的全部或者部分转移给第三人的，应当经债权人同意
  original_text: '第五百五十一条 债务人将债务的全部或者部分转移给第三人的，应当经债权人同意。

    债务人或者第三人可以催告债权人在合理期限内予以同意，债权人未作表示的，视为不同意。

    '
  interpretation:
    core_principle: 债务转移必须经债权人同意
    key_points:
    - 必须经债权人同意（与债权转让不同）
    - 默示视为不同意
    - 新债务人承担原债务人债务
  contract_review_tips: 债务转移必须取得债权人书面同意
  risk_level: 高
  keywords:
  - 债务转移
  - 债务承担
  - 债权人同意
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-557
  name: 合同终止情形
  category: 合同终止
  title: 有下列情形之一的，债权债务终止
  original_text: '第五百五十七条 有下列情形之一的，债权债务终止：

    （一）债务已经履行；

    （二）债务相互抵销；

    （三）债务人依法将标的物提存；

    （四）债权人免除债务；

    （五）债权债务同归于一人；

    （六）法律规定或者当事人约定终止的其他情形。

    合同解除的，该合同的权利义务关系终止。

    '
  interpretation:
    core_principle: 履行、抵销、提存、免除、混同等导致合同终止
    key_points:
    - 清偿是最主要的终止原因
    - 合同解除是独立的终止原因
    - 终止后当事人仍负有诚信义务
  contract_review_tips: 合同终止后，结算和清理条款仍然有效
  risk_level: 低
  keywords:
  - 合同终止
  - 履行
  - 抵销
  - 提存
  - 免除
  - 混同
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-562
  name: 合同约定解除
  category: 合同解除
  title: 当事人协商一致，可以解除合同；当事人可以约定一方解除合同的事由
  original_text: '第五百六十二条 当事人协商一致，可以解除合同。

    当事人可以约定一方解除合同的事由。解除合同的事由发生时，解除权人可以解除合同。

    '
  interpretation:
    core_principle: 合同自由原则允许约定解除条件
    key_points:
    - 协商一致可随时解除
    - 可事先约定解除事由
    - 约定解除事由发生时，解除权人可单方解除
  contract_review_tips: 明确约定解除事由和解除程序，避免争议
  risk_level: 中
  keywords:
  - 约定解除
  - 协商解除
  - 解除事由
  - 解除权
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-563
  name: 法定解除权
  category: 合同解除
  title: 有下列情形之一的，当事人可以解除合同
  original_text: '第五百六十三条 有下列情形之一的，当事人可以解除合同：

    （一）因不可抗力致使不能实现合同目的；

    （二）在履行期限届满前，当事人一方明确表示或者以自己的行为表明不履行主要债务；

    （三）当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行；

    （四）当事人一方迟延履行债务或者有其他违约行为致使不能实现合同目的；

    （五）法律规定的其他情形。

    以持续履行的债务为内容的不定期合同，当事人可以随时解除合同，但是应当在合理期限之前通知对方。

    '
  interpretation:
    core_principle: 根本违约导致合同目的不能实现时可法定解除
    key_points:
    - 不可抗力致使合同目的不能实现
    - 预期违约（明确表示或行为表明不履行）
    - 迟延履行经催告仍不履行
    - 根本违约致使合同目的不能实现
    - 不定期持续性合同可随时解除（应提前通知）
  contract_review_tips: 法定解除是兜底权利，但应谨慎行使，保留催告和违约证据
  risk_level: 高
  keywords:
  - 法定解除
  - 不可抗力
  - 预期违约
  - 迟延履行
  - 根本违约
  - 合同目的
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-564
  name: 解除权行使期限
  category: 合同解除
  title: 法律规定或者当事人约定解除权行使期限，期限届满当事人不行使的，该权利消灭
  original_text: '第五百六十四条 法律规定或者当事人约定解除权行使期限，期限届满当事人不行使的，该权利消灭。

    法律没有规定或者当事人没有约定解除权行使期限，自解除权人知道或者应当知道解除事由之日起一年内不行使，或者经对方催告后在合理期限内不行使的，该权利消灭。

    '
  interpretation:
    core_principle: 解除权应在期限内行使，过期消灭
    key_points:
    - 约定期限优先
    - 无法定或约定期限的，期限为知道事由之日起1年
    - 催告后合理期限不行使也消灭
  contract_review_tips: 解除事由发生后，应及时行使解除权，避免过期
  risk_level: 高
  keywords:
  - 解除权期限
  - 除斥期间
  - 一年期限
  - 催告
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-565
  name: 解除权行使方式
  category: 合同解除
  title: 当事人一方依法主张解除合同的，应当通知对方
  original_text: '第五百六十五条 当事人一方依法主张解除合同的，应当通知对方。合同自通知到达对方时解除；通知载明债务人在一定期限内不履行债务则合同自动解除，债务人在该期限内未履行债务的，合同自通知载明的期限届满时解除。对方对解除合同有异议的，任何一方当事人均可以请求人民法院或者仲裁机构确认解除行为的效力。

    当事人一方未通知对方，直接以提起诉讼或者申请仲裁的方式依法主张解除合同，人民法院或者仲裁机构确认该主张的，合同自起诉状副本或者仲裁申请书副本送达对方时解除。

    '
  interpretation:
    core_principle: 合同解除需通知，到达即生效
    key_points:
    - 通知到达对方时解除
    - 可约定自动解除条件
    - 可直接起诉解除，起诉状副本送达时解除
    - 对解除有异议可请求确认效力
  contract_review_tips: 解除通知应采用书面形式，保留送达证据
  risk_level: 高
  keywords:
  - 解除通知
  - 通知到达
  - 自动解除
  - 确认解除效力
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-566
  name: 合同解除的效力
  category: 合同解除
  title: 合同解除后，尚未履行的终止履行；已经履行的可以请求恢复原状或者采取其他补救措施
  original_text: '第五百六十六条 合同解除后，尚未履行的，终止履行；已经履行的，根据履行情况和合同性质，当事人可以请求恢复原状或者采取其他补救措施，并有权请求赔偿损失。

    合同因违约解除的，解除权人可以请求违约方承担违约责任，但是当事人另有约定的除外。

    主合同解除后，担保人对债务人应当承担的民事责任仍应当承担担保责任，但是担保合同另有约定的除外。

    '
  interpretation:
    core_principle: 合同解除不影响违约责任和担保责任
    key_points:
    - 尚未履行的终止履行
    - 已履行的可恢复原状或补救
    - 违约解除仍可主张违约责任
    - 合同解除不影响担保责任
  contract_review_tips: 合同解除后仍可主张违约金和损害赔偿
  risk_level: 高
  keywords:
  - 解除效力
  - 恢复原状
  - 补救措施
  - 违约责任
  - 担保责任
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-577
  name: 违约责任基本形态
  category: 违约责任
  title: 当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任
  original_text: '第五百七十七条 当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。

    '
  interpretation:
    core_principle: 严格责任原则，无过错也需承担违约责任
    key_points:
    - 只要违约即承担责任，无需证明过错（严格责任）
    - 责任形态：继续履行、补救措施、赔偿损失
    - 三种责任形态可并用
  contract_review_tips: 合同一旦签署，必须严格履行，违约即需承担责任
  risk_level: 高
  keywords:
  - 违约责任
  - 继续履行
  - 补救措施
  - 赔偿损失
  - 严格责任
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-578
  name: 预期违约
  category: 违约责任
  title: 当事人一方明确表示或者以自己的行为表明不履行合同义务的，对方可以在履行期限届满前请求其承担违约责任
  original_text: '第五百七十八条 当事人一方明确表示或者以自己的行为表明不履行合同义务的，对方可以在履行期限届满前请求其承担违约责任。

    '
  interpretation:
    core_principle: 履行期前违约也需承担责任
    key_points:
    - 明示违约：明确表示不履行
    - 默示违约：以行为表明不履行
    - 可在履行期届满前主张违约责任
    - 守约方应及时采取措施防止损失扩大
  contract_review_tips: 发现对方预期违约时，及时固定证据并主张权利
  risk_level: 高
  keywords:
  - 预期违约
  - 明示违约
  - 默示违约
  - 履行期限届满前
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-579
  name: 金钱债务继续履行
  category: 违约责任
  title: 当事人一方未支付价款、报酬、租金、利息，或者不履行其他金钱债务的，对方可以请求其支付
  original_text: '第五百七十九条 当事人一方未支付价款、报酬、租金、利息，或者不履行其他金钱债务的，对方可以请求其支付。

    '
  interpretation:
    core_principle: 金钱债务必须继续履行，无履行不能
    key_points:
    - 金钱债务不发生履行不能
    - 守约方必须可以请求继续履行
    - 还可主张逾期利息或违约金
  contract_review_tips: 金钱债务必须支付，不能以无力支付为由拒绝履行
  risk_level: 高
  keywords:
  - 金钱债务
  - 价款
  - 报酬
  - 租金
  - 利息
  - 继续履行
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-580
  name: 非金钱债务继续履行例外
  category: 违约责任
  title: 当事人一方不履行非金钱债务或者履行非金钱债务不符合约定的，对方可以请求履行，但有例外情形
  original_text: '第五百八十条 当事人一方不履行非金钱债务或者履行非金钱债务不符合约定的，对方可以请求履行，但是有下列情形之一的除外：

    （一）法律上或者事实上不能履行；

    （二）债务的标的不适于强制履行或者履行费用过高；

    （三）债权人在合理期限内未请求履行。

    有前款规定的除外情形之一，致使不能实现合同目的的，人民法院或者仲裁机构可以根据当事人的请求终止合同权利义务关系，但是不影响违约责任的承担。

    '
  interpretation:
    core_principle: 非金钱债务继续履行有例外
    key_points:
    - 法律上或事实上不能履行的可不继续履行
    - 标的不适于强制履行或费用过高的
    - 债权人未在合理期限内请求履行的
    - 不能履行导致合同目的落空的，可终止合同但不免除违约责任
  contract_review_tips: 非金钱债务可能因履行不能而免除继续履行责任，但仍需承担违约责任
  risk_level: 中
  keywords:
  - 非金钱债务
  - 履行不能
  - 强制履行
  - 履行费用过高
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-581
  name: 替代履行
  category: 违约责任
  title: 债务不履行可以请求第三人替代履行，费用由债务人负担
  original_text: '第五百八十一条 当事人一方不履行债务或者履行债务不符合约定，根据债务的性质不得强制履行的，对方可以请求其负担由第三人替代履行的费用。

    '
  interpretation:
    core_principle: 不得强制履行的债务可由第三人替代履行
    key_points:
    - 适用于不得强制履行的债务
    - 由第三人替代履行
    - 费用由违约方承担
  contract_review_tips: 对于不适于强制履行的义务，可安排第三方履行并向违约方追偿费用
  risk_level: 低
  keywords:
  - 替代履行
  - 第三人履行
  - 履行费用
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-582
  name: 瑕疵履行违约责任
  category: 违约责任
  title: 履行不符合约定的，应当按照当事人的约定承担违约责任
  original_text: '第五百八十二条 履行不符合约定的，应当按照当事人的约定承担违约责任。对违约责任没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定的，受损害方根据标的的性质以及损失的大小，可以合理选择请求对方承担修理、重作、更换、退货、减少价款或者报酬等违约责任。

    '
  interpretation:
    core_principle: 瑕疵履行可选择多种补救方式
    key_points:
    - 首先按约定承担责任
    - 无约定的可选择：修理、重作、更换、退货、减价等
    - 选择应合理，与损失大小相当
  contract_review_tips: 明确约定瑕疵履行的具体违约责任和补救方式
  risk_level: 中
  keywords:
  - 瑕疵履行
  - 质量不符
  - 修理
  - 重作
  - 更换
  - 退货
  - 减价
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-583
  name: 违约损失赔偿
  category: 损失赔偿
  title: 当事人一方不履行合同义务或者履行合同义务不符合约定的，在履行义务或者采取补救措施后，对方还有其他损失的，应当赔偿损失
  original_text: '第五百八十三条 当事人一方不履行合同义务或者履行合同义务不符合约定的，在履行义务或者采取补救措施后，对方还有其他损失的，应当赔偿损失。

    '
  interpretation:
    core_principle: 继续履行不免除损失赔偿责任
    key_points:
    - 继续履行或补救后仍需赔偿损失
    - 损失包括可得利益损失
    - 赔偿范围以实际损失为限
  contract_review_tips: 对方履行义务后，如有损失仍可主张赔偿
  risk_level: 中
  keywords:
  - 损失赔偿
  - 继续履行
  - 补救措施
  - 实际损失
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-584
  name: 赔偿范围（可得利益）
  category: 损失赔偿
  title: 损失赔偿额应当相当于因违约所造成的损失，包括合同履行后可以获得的利益
  original_text: '第五百八十四条 当事人一方不履行合同义务或者履行合同义务不符合约定，造成对方损失的，损失赔偿额应当相当于因违约所造成的损失，包括合同履行后可以获得的利益；但是，不得超过违约一方订立合同时预见到或者应当预见到的因违约可能造成的损失。

    '
  interpretation:
    core_principle: 完全赔偿原则，包括可得利益，但受可预见性限制
    key_points:
    - 赔偿范围：直接损失 + 可得利益损失
    - 可得利益是合同履行后可获得的利益
    - 不得超过违约方订立合同时可预见的范围
  contract_review_tips: 主张损失赔偿时，应详细举证直接损失和可得利益损失
  risk_level: 高
  keywords:
  - 损失赔偿范围
  - 可得利益
  - 可预见性规则
  - 直接损失
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-585
  name: 违约金调整规则
  category: 违约金
  title: 约定的违约金低于或过分高于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以调整
  original_text: '第五百八十五条 当事人可以约定一方违约时应当根据违约情况向对方支付一定数额的违约金，也可以约定因违约产生的损失赔偿额的计算方法。

    约定的违约金低于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以增加；约定的违约金过分高于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以适当减少。

    当事人就迟延履行约定违约金的，违约方支付违约金后，还应当履行债务。

    '
  interpretation:
    core_principle: 违约金以补偿为主，惩罚为辅，过高可调整
    key_points:
    - 违约金低于损失的可请求增加
    - 违约金过分高于损失（一般超损失30%）的可请求适当减少
    - 迟延履行违约金支付后仍需履行债务
    - 调整需当事人请求，法院不主动调整
  contract_review_tips: 违约金约定应合理，避免过高被调低；迟延履行违约金应明确约定
  risk_level: 高
  keywords:
  - 违约金
  - 违约金调整
  - 违约金过高
  - 30%
  - 迟延履行违约金
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-586
  name: 定金规则
  category: 定金
  title: 当事人可以约定一方向对方给付定金作为债权的担保
  original_text: '第五百八十六条 当事人可以约定一方向对方给付定金作为债权的担保。定金合同自实际交付定金时成立。

    定金的数额由当事人约定；但是，不得超过主合同标的额的百分之二十，超过部分不产生定金的效力。实际交付的定金数额多于或者少于约定数额的，视为变更约定的定金数额。

    '
  interpretation:
    core_principle: 定金是实践合同，数额有限制
    key_points:
    - 定金合同是实践合同，交付才成立
    - 数额不超过主合同标的20%，超过部分无效
    - 实际交付为准，多退少补
  contract_review_tips: 定金合同应以实际交付为准，金额不超过合同标的20%
  risk_level: 中
  keywords:
  - 定金
  - 定金合同
  - 实践合同
  - 20%限制
  - 定金交付
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-587
  name: 定金罚则
  category: 定金
  title: 债务人履行债务的，定金应当抵作价款或者收回
  original_text: '第五百八十七条 债务人履行债务的，定金应当抵作价款或者收回。给付定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，无权请求返还定金；收受定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，应当双倍返还定金。

    '
  interpretation:
    core_principle: 违约致使合同目的不能实现的适用定金罚则
    key_points:
    - 给付定金方违约：无权请求返还
    - 收受定金方违约：双倍返还
    - 必须是根本违约致使合同目的不能实现才适用
    - 轻微违约不适用定金罚则
  contract_review_tips: 定金罚则适用于根本违约，轻微违约不能适用双倍返还
  risk_level: 高
  keywords:
  - 定金罚则
  - 双倍返还
  - 无权返还
  - 根本违约
  - 合同目的
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-588
  name: 违约金与定金竞合
  category: 违约金
  title: 当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款
  original_text: '第五百八十八条 当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款。

    定金不足以弥补一方违约造成的损失的，对方可以请求赔偿超过定金数额的损失。

    '
  interpretation:
    core_principle: 违约金与定金择一适用，不足部分可补充赔偿
    key_points:
    - 违约金和定金只能择一适用（二选一）
    - 定金不足以弥补损失的，可请求赔偿差额
    - 选择权在守约方
  contract_review_tips: 同时约定违约金和定金的，守约方有权选择对自己最有利的主张
  risk_level: 高
  keywords:
  - 违约金定金竞合
  - 择一适用
  - 选择适用
  - 差额赔偿
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-590
  name: 减损规则
  category: 损失赔偿
  title: 当事人一方违约后，对方应当采取适当措施防止损失的扩大
  original_text: '第五百九十条 当事人一方违约后，对方应当采取适当措施防止损失的扩大；没有采取适当措施致使损失扩大的，不得就扩大的损失请求赔偿。

    当事人因防止损失扩大而支出的合理费用，由违约方负担。

    '
  interpretation:
    core_principle: 守约方有义务防止损失扩大
    key_points:
    - 守约方应采取适当措施防止损失扩大
    - 未采取措施导致扩大的损失不能主张
    - 减损支出的合理费用由违约方承担
  contract_review_tips: 对方违约后，应及时采取合理措施防止损失扩大，保留支出证据
  risk_level: 中
  keywords:
  - 减损规则
  - 防止损失扩大
  - 减损义务
  - 减损费用
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-591
  name: 过失相抵
  category: 损失赔偿
  title: 当事人一方违约造成对方损失，对方对损失的发生有过错的，可以减少相应的损失赔偿额
  original_text: '第五百九十一条 当事人一方违约造成对方损失，对方对损失的发生有过错的，可以减少相应的损失赔偿额。

    '
  interpretation:
    core_principle: 双方都有过错的，按过错分担损失
    key_points:
    - 守约方对损失发生有过错的
    - 可相应减少损失赔偿额
    - 过错需与损失发生有因果关系
  contract_review_tips: 主张损失赔偿时，如自身有过错，赔偿额可能相应减少
  risk_level: 中
  keywords:
  - 过失相抵
  - 与有过失
  - 过错分担
  - 减少赔偿
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-592
  name: 损益相抵
  category: 损失赔偿
  title: 当事人一方因对方违约而获有利益的，损失赔偿额应扣除所获利益
  original_text: '第五百九十二条 当事人都违反合同的，应当各自承担相应的责任。

    当事人一方违约造成对方损失，对方对损失的发生有过错的，可以减少相应的损失赔偿额。

    '
  interpretation:
    core_principle: 双方违约各自承担责任
    key_points:
    - 双方都违约的，各自承担相应责任
    - 可过失相抵，根据过错程度分担
    - 不适用过错相抵时分别承担
  contract_review_tips: 双方都有违约行为时，应分清责任大小，各自承担
  risk_level: 中
  keywords:
  - 双方违约
  - 各自承担
  - 过错程度
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-593
  name: 第三人原因违约
  category: 违约责任
  title: 当事人一方因第三人的原因造成违约的，应当依法向对方承担违约责任
  original_text: '第五百九十三条 当事人一方因第三人的原因造成违约的，应当依法向对方承担违约责任。当事人一方和第三人之间的纠纷，依照法律规定或者按照约定处理。

    '
  interpretation:
    core_principle: 合同相对性，第三人原因不免除违约责任
    key_points:
    - 因第三人原因违约仍需向对方承担责任
    - 与第三人的纠纷另行解决
    - 体现合同相对性原则
  contract_review_tips: 不能以第三方原因为由拒绝承担违约责任，应先向守约方承担，再向第三方追偿
  risk_level: 高
  keywords:
  - 第三人原因
  - 合同相对性
  - 第三方原因
  - 追偿
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
- id: CC-594
  name: 违约责任与侵权责任竞合
  category: 违约责任
  title: 因当事人一方的违约行为，损害对方人身权益、财产权益的，受损害方有权选择请求其承担违约责任或者侵权责任
  original_text: '第五百九十四条 因当事人一方的违约行为，损害对方人身权益、财产权益的，受损害方有权选择请求其承担违约责任或者侵权责任。

    '
  interpretation:
    core_principle: 违约侵权竞合时，受害方享有选择权
    key_points:
    - 同一行为同时构成违约和侵权
    - 受害方只能择一主张
    - 选择后不能再变更（一般情况下）
  contract_review_tips: 违约同时造成人身财产损害时，应评估选择违约或侵权主张更有利
  risk_level: 中
  keywords:
  - 责任竞合
  - 违约侵权竞合
  - 请求权竞合
  - 选择权
  version: v1.0
  updated: '2026-04-24'
  source: 《中华人民共和国民法典》
