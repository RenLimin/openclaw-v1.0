# =============================================================================
# OCR 引擎配置文件
# =============================================================================
# 多引擎调度配置，支持 Tesseract / PaddleOCR / EasyOCR
# =============================================================================

# -----------------------------------------------------------------------------
# 全局配置
# -----------------------------------------------------------------------------
global:
  default_engine: tesseract        # 默认使用的引擎: tesseract / paddleocr / easyocr
  auto_fallback: true              # 引擎不可用时自动 fallback
  max_retry: 2                     # 识别失败重试次数
  timeout_per_page: 30             # 单页识别超时（秒）

# -----------------------------------------------------------------------------
# Tesseract 引擎配置 (默认推荐)
# -----------------------------------------------------------------------------
tesseract:
  enabled: true
  path: auto                       # auto = 自动检测 PATH，或填绝对路径如 /usr/bin/tesseract
  languages: chi_sim+eng           # 默认语言: 简体中文 + 英文
  dpi: 300                         # PDF 渲染 DPI (150=快速, 300=标准, 400=高精度)
  oem: 3                           # OCR 引擎模式: 0=传统, 1=LSTM, 2=混合, 3=默认
  psm: 6                           # 页面分割模式: 6=假设一个统一的文本块（推荐）

  # 自定义配置
  custom_config: >
    --oem {oem} --psm {psm} -l {languages}
    --dpi {dpi}

  # 语言包额外配置
  tessdata_dir: auto               # auto = 自动检测，或填自定义路径

# -----------------------------------------------------------------------------
# PaddleOCR 引擎配置 (高精度中文，预留接口)
# -----------------------------------------------------------------------------
paddleocr:
  enabled: false                   # 默认禁用，需要时手动启用
  use_angle_cls: true              # 启用方向分类
  lang: ch                         # 语言: ch/en
  use_gpu: false                   # 使用 GPU (需安装 paddlepaddle-gpu)
  show_log: false                  # 显示日志

  # 模型路径 (auto = 自动下载)
  det_model_dir: auto
  rec_model_dir: auto
  cls_model_dir: auto

# -----------------------------------------------------------------------------
# EasyOCR 引擎配置 (开发环境推荐，预留接口)
# -----------------------------------------------------------------------------
easyocr:
  enabled: false                   # 默认禁用，需要时手动启用
  languages:
    - ch_sim
    - en
  gpu: false                       # 使用 GPU
  verbose: false                   # 详细输出
  download_enabled: true           # 允许自动下载模型

# -----------------------------------------------------------------------------
# 批处理配置
# -----------------------------------------------------------------------------
batch:
  max_workers: 1                   # 最大并发数 (建议: 1，避免内存溢出)
  page_batch_size: 5               # 内存中同时保留的页数
  temp_dir: auto                   # 临时文件目录 (auto = 系统临时目录)
  cleanup_temp: true               # 处理完成后清理临时文件

# -----------------------------------------------------------------------------
# 后处理配置
# -----------------------------------------------------------------------------
post_processing:
  enable_noise_cleaning: true      # 默认启用噪音清理
  enable_auto_correction: true     # 默认启用自动纠错
  correction_priority:
    - page_break_markers           # 1. 先清理跨页标记
    - seal_interference            # 2. 清理公章干扰
    - table_garbage                # 3. 清理表格边框
    - garbage_strings              # 4. 清理其他垃圾
    - bracket_corrections          # 5. 修正括号
    - amount_corrections           # 6. 修正金额
    - number_corrections           # 7. 修正序号
    - character_corrections        # 8. 最后修正形近字

  min_line_length: 3               # 过滤过短的行
  remove_duplicate_lines: true     # 移除重复行
  merge_broken_lines: true         # 合并断裂的行 (中英文换行)

# -----------------------------------------------------------------------------
# 质量评估配置
# -----------------------------------------------------------------------------
quality_assessment:
  enabled: true                    # 默认启用快速质量评估
  detailed: false                  # 详细评估 (消耗更多资源)
  thresholds:
    excellent: 90                  # 优秀 ≥ 90 分
    good: 75                       # 良好 ≥ 75 分
    fair: 60                       # 一般 ≥ 60 分
    poor: 40                       # 较差 ≥ 40 分 (低于 40 = 不可用)

  assessment_items:
    chinese_recognition_rate: true  # 中文识别率估算
    noise_level: true               # 噪音等级评估
    table_integrity: true           # 表格完整性检测
    line_coherence: true            # 行连贯性评分
    garbage_ratio: true             # 垃圾字符比例

# -----------------------------------------------------------------------------
# 表格检测配置引用
# -----------------------------------------------------------------------------
table_detection:
  config_file: table-detection.yaml

# -----------------------------------------------------------------------------
# 纠错字典配置引用
# -----------------------------------------------------------------------------
correction:
  config_file: correction-dict.yaml

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logging:
  level: INFO                      # DEBUG / INFO / WARNING / ERROR
  format: "%(asctime)s - %(levelname)s - %(message)s"
  enable_console: true
  enable_file: false
  log_file: ocr-engine.log

# =============================================================================
# 版本信息
# =============================================================================
version: '1.0'
created: '2026-04-24'
source: '从 contract-clause-split 独立固化为通用底层技能'
