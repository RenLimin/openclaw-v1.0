# =============================================================================
# 审核输出报告规范
# =============================================================================
report_spec:
  output_format: "structured"
  
  risk_item_structure:
    - field: "rule_id"
      description: "触发的规则ID"
    - field: "rule_name"
      description: "规则名称"
    - field: "severity"
      description: "风险等级"
    - field: "description"
      description: "风险描述"
    - field: "location"
      description: "风险位置（条款号/上下文）"
    - field: "law_basis"
      description: "法条依据列表"
    - field: "suggestion"
      description: "优化建议"

  law_citation_format: "《民法典》第{article_no}条：{article_content}"

  suggestion_template:
    high: "【必须修改】{suggestion}，否则将产生重大法律风险"
    medium: "【建议修改】{suggestion}，以避免潜在争议"
    low: "【优化建议】{suggestion}，使合同表述更加严谨"

  conclusion_levels:
    PASS:
      label: "审核通过"
      description: "合同整体合规，无重大风险"
      max_score: 5
    ATTENTION:
      label: "需重点关注"
      description: "存在中等风险，建议重点关注相关条款"
      max_score: 19
    REJECT:
      label: "建议退回"
      description: "存在重大风险或累计评分过高，建议退回修改"
      max_score: 999
