# -----------------------------------------------------------------------------
# 使用说明
# -----------------------------------------------------------------------------
usage:
  description: |
    在 OCR 识别后，逐行应用此字典进行替换修正。
    注意：应先应用修正，再进行业务逻辑处理（如条款拆分、信息提取等）。
  apply_order:
    - 1. 先应用 page_break_markers 清理跨页标记
    - 2. 应用 seal_interference_corrections 清理公章干扰
    - 3. 应用 table_garbage_strings 清理表格边框垃圾
    - 4. 应用 garbage_strings 清理其他垃圾
    - 5. 应用 bracket_corrections 修正括号识别错误
    - 6. 应用 amount_corrections 修正金额断裂问题
    - 7. 应用 number_corrections 修正序号
    - 8. 最后应用 character_corrections 修正形近字

