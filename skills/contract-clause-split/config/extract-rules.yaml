# 合同关键信息提取规则
# 使用正则表达式提取合同中的关键信息

extraction_rules:

  # 合同名称/标题提取
  contract_title:
    name: "合同名称"
    type: "text"
    patterns:
      - "采购合同"
      - "服务合同"
      - "技术合同"
      - "买卖合同"
      - "合作协议"
      - "框架协议"
      - "项目合同"
      - "合同名称.*[:：]"
    description: "从合同前5%内容中提取标题"

  # 合同编号提取
  contract_number:
    name: "合同编号"
    type: "text"
    patterns:
      - "合同编号[:：\\s]*([A-Za-z0-9\\-]+)"
      - "编号[:：\\s]*([A-Za-z0-9\\-]+)"
      - "HT[\\-]?[0-9]{6,}"
      - "XSZS[0-9]+"
    description: "提取合同编号"

  # 甲方信息提取
  party_a:
    name: "甲方（需方）"
    type: "text"
    patterns:
      - "甲方（需方）[：:]\\s*([^\\n，。；]+)"
      - "甲方[：:]\\s*([^\\n，。；]+公司)"
      - "甲方[^：:]*[：:]\\s*([^\\n，。；]{2,30})"
      - "需方[：:]\\s*([^\\n，。；]{2,30})"
      - "买方[：:]\\s*([^\\n，。；]{2,30})"
      - "委托方[：:]\\s*([^\\n，。；]{2,30})"
    description: "提取甲方名称"

  # 乙方信息提取
  party_b:
    name: "乙方（供方）"
    type: "text"
    patterns:
      - "乙方（供方）[：:]\\s*([^\\n，。；]+)"
      - "乙方[：:]\\s*([^\\n，。；]+公司)"
      - "乙方[^：:]*[：:]\\s*([^\\n，。；]{2,30})"
      - "供方[：:]\\s*([^\\n，。；]{2,30})"
      - "卖方[：:]\\s*([^\\n，。；]{2,30})"
      - "受托方[：:]\\s*([^\\n，。；]{2,30})"
    description: "提取乙方名称"

  # 合同金额提取
  contract_amount:
    name: "合同金额"
    type: "currency"
    patterns:
      - "人民币[：:\\s]*([0-9,]+\\.?[0-9]*)\\s*元"
      - "金额[：:\\s]*([0-9,]+\\.?[0-9]*)\\s*元"
      - "总价[：:\\s]*([0-9,]+\\.?[0-9]*)\\s*元"
      - "合同总价[：:\\s]*([0-9,]+\\.?[0-9]*)\\s*元"
      - "￥[：:\\s]*([0-9,]+\\.?[0-9]*)"
      - "¥[：:\\s]*([0-9,]+\\.?[0-9]*)"
      - "含税金额[：:\\s]*([0-9,]+\\.?[0-9]*)"
      - "不含税金额[：:\\s]*([0-9,]+\\.?[0-9]*)"
    description: "提取合同金额数值"

  # 金额大写提取
  amount_upper:
    name: "大写金额"
    type: "text"
    patterns:
      - "大写[:：\\s]*([零壹贰叁肆伍陆柒捌玖拾佰仟万亿元角分正整]+)"
      - "人民币大写[:：\\s]*([零壹贰叁肆伍陆柒捌玖拾佰仟万亿元角分正整]+)"
    description: "提取大写金额"

  # 税率提取
  tax_rate:
    name: "税率"
    type: "percentage"
    patterns:
      - "税率[:：\\s]*([0-9]+\\.?[0-9]*)\\s*%"
      - "税点[:：\\s]*([0-9]+\\.?[0-9]*)\\s*%"
      - "增值税税率[:：\\s]*([0-9]+\\.?[0-9]*)"
    description: "提取税率"

  # 签订日期提取
  sign_date:
    name: "签订日期"
    type: "date"
    patterns:
      - "签订日期[:：\\s]*([0-9]{4}年[0-9]{1,2}月[0-9]{1,2}日)"
      - "签署日期[:：\\s]*([0-9]{4}年[0-9]{1,2}月[0-9]{1,2}日)"
      - "签订于[:：\\s]*([0-9]{4}年[0-9]{1,2}月[0-9]{1,2}日)"
      - "([0-9]{4})年([0-9]{1,2})月([0-9]{1,2})日"
      - "([0-9]{4})-([0-9]{1,2})-([0-9]{1,2})"
    description: "提取合同签订日期"

  # 交付/履行期限提取
  delivery_period:
    name: "交付期限"
    type: "text"
    patterns:
      - "交付日期[:：\\s]*([^\\n。；]+)"
      - "交付时间[:：\\s]*([^\\n。；]+)"
      - "交货期[:：\\s]*([^\\n。；]+)"
      - "履行期限[:：\\s]*([^\\n。；]+)"
      - "工期[:：\\s]*([^\\n。；]+)"
      - "本合同签订后([0-9]+)个工作日内"
    description: "提取交付或履行期限"

  # 交货地点提取
  delivery_location:
    name: "交付地点"
    type: "text"
    patterns:
      - "交付地点[:：\\s]*([^\\n。；]+)"
      - "交货地点[:：\\s]*([^\\n。；]+)"
      - "履行地点[:：\\s]*([^\\n。；]+)"
    description: "提取交付地点"

  # 付款方式提取
  payment_method:
    name: "付款方式"
    type: "text"
    patterns:
      - "付款方式[:：\\s]*([^\\n。；]{5,60})"
      - "支付方式[:：\\s]*([^\\n。；]{5,60})"
      - "结算方式[:：\\s]*([^\\n。；]{5,60})"
    description: "提取付款方式说明"

# 提取配置
extraction_config:
  # 搜索范围：前 N% 的内容（标题、关键信息通常在开头）
  search_range_percent: 30
  # 最大搜索字符数
  search_max_chars: 5000
  # 提取后去重
  deduplicate: true
