# ==========================================
# 合同条款分类规则（依据《民法典》合同编）
# ==========================================
# 每个分类包含：
#   - name: 分类名称
#   - legal_basis: 民法典依据
#   - priority: 匹配优先级（越高越优先）
#   - core_features: 核心特征（高权重匹配 ×3）
#   - keywords: 关键词（普通权重 ×1）
#   - exclude_keywords: 排除关键词（命中则排除此分类）
# ==========================================

classification_rules:

  # ==========================================
  # 01. 基本信息
  # ==========================================
  - code: "01"
    name: "基本信息"
    legal_basis: "《民法典》第470条，合同一般条款"
    priority: 5
    core_features:
      - "合同编号"
      - "签订日期"
      - "签订地点"
      - "签约地点"
      - "本合同由"
      - "合同名称"
      - "采购合同"
      - "服务合同"
      - "技术合同"
      - "合作协议"
    keywords:
      - "第一条"
      - "第二条"
      - "总则"
      - "鉴于"
      - "前言"
      - "有效期"
      - "有效期限"
      - "期限"
      - "自.*起至.*止"
    exclude_keywords:
      - "违约金"
      - "赔偿"

  # ==========================================
  # 02. 主体信息
  # ==========================================
  - code: "02"
    name: "主体信息"
    legal_basis: "《民法典》第464条、第470条，合同当事人"
    priority: 9  # 最高优先级，避免被其他分类抢走
    core_features:
      - "甲方（"
      - "乙方（"
      - "需方（"
      - "供方（"
      - "买方（"
      - "卖方（"
      - "委托方（"
      - "受托方（"
      - "统一社会信用代码"
      - "法定代表人"
    keywords:
      - "地址"
      - "住所地"
      - "联系电话"
      - "邮箱"
      - "联系人"
      - "有限公司"
      - "股份公司"
    exclude_keywords:
      - "违约"
      - "解除"
      - "赔偿"
      - "违约金"

  # ==========================================
  # 03. 标的条款
  # ==========================================
  - code: "03"
    name: "标的条款"
    legal_basis: "《民法典》第470条，合同标的"
    description: "合同权利义务指向的对象（货物、服务、工程项目等）的具体描述"
    priority: 8  # 提升优先级，表格内容优先匹配
    core_features:
      - "标的"
      - "货物"
      - "产品名称"
      - "服务内容"
      - "采购内容"
      - "供货范围"
      - "采购标的"
      - "技术规格"
      - "配置清单"
      - "设备清单"
      - "[表格1]"
      - "[表格2]"
    keywords:
      - "规格"
      - "型号"
      - "品牌"
      - "数量"
      - "技术要求"
      - "技术标准"
      - "质量标准"
      - "质量要求"
      - "设备"
      - "电脑"
      - "手机"
      - "服务器"
      - "终端"
      - "软件"
      - "授权"
      - "维保"
      - "保修"
      - "定制版"
      - "内存"
      - "硬盘"
      - "CPU"
      - "固态硬盘"
      - "配置参数"
      - "技术参数"
      - "参数表"
    # 关键排除规则：违约/权利义务场景的设备描述不算标的条款
    exclude_keywords:
      - "违约"
      - "逾期"
      - "赔偿"
      - "解除"
      - "拒收"
      - "退货"
      - "更换"
      - "违约金"
      - "甲方有权"
      - "乙方有权"
      - "甲方应"
      - "乙方应"
      - "甲方应当"
      - "乙方应当"

  # ==========================================
  # 04. 价格条款
  # ==========================================
  - code: "04"
    name: "价格条款"
    legal_basis: "《民法典》第470条，价款或者报酬"
    priority: 8  # 提升优先级，金额描述优先匹配
    core_features:
      - "合同金额"
      - "合同总价"
      - "总价"
      - "人民币.*元"
      - "大写金额"
      - "含税"
      - "不含税"
      - "税率"
      - "发票"
    keywords:
      - "价款"
      - "费用"
      - "金额"
      - "付款"
      - "支付"
      - "结算"
      - "付款方式"
      - "支付方式"
      - "预付款"
      - "首付款"
      - "尾款"
      - "到账"
    exclude_keywords:
      - "违约金"
      - "赔偿损失"
      - "逾期违约金"

  # ==========================================
  # 05. 履行条款
  # ==========================================
  - code: "05"
    name: "履行条款"
    legal_basis: "《民法典》第509条-第531条，合同的履行"
    priority: 8  # 提升优先级，交付/验收内容优先匹配
    core_features:
      - "交付"
      - "交货"
      - "到货"
      - "验收"
      - "验收标准"
      - "交付时间"
      - "交付地点"
      - "交货地点"
      - "交付方式"
      - "交货期"
      - "工期"
      - "进度"
      - "安装"
      - "调试"
      - "部署"
      - "上线"
      - "培训"
      - "包装"
      - "运输"
      - "货运"
      - "物流"
      - "风险转移"
      - "所有权转移"
    keywords:
      - "试运行"
      - "最终验收"
      - "初步验收"
      - "到货验收"
    exclude_keywords:
      - "违约责任"
      - "违约金"
      - "赔偿损失"

  # ==========================================
  # 06. 权利义务条款
  # ==========================================
  - code: "06"
    name: "权利义务"
    legal_basis: "《民法典》第509条，当事人应当按照约定全面履行自己的义务"
    priority: 9  # 最高优先级，权利义务表述非常明确
    core_features:
      - "甲方权利"
      - "甲方义务"
      - "乙方权利"
      - "乙方义务"
      - "双方权利"
      - "双方义务"
      - "甲方有权"
      - "乙方有权"
      - "甲方应"
      - "乙方应"
      - "甲方应当"
      - "乙方应当"
      - "承诺"
      - "保证"
    keywords:
      - "权利"
      - "义务"
      - "责任"
      - "应当"
      - "不得"
      - "必须"
    exclude_keywords:
      - "违约金"
      - "赔偿损失"
      - "赔偿金"

  # ==========================================
  # 07. 违约责任条款（降低优先级避免过度匹配）
  # ==========================================
  - code: "07"
    name: "违约责任"
    legal_basis: "《民法典》第577条-第594条，违约责任"
    priority: 7  # 降低优先级，避免过度匹配表格和金额描述
    core_features:
      - "违约责任"
      - "违约方"
      - "违约金"
      - "赔偿损失"
      - "赔偿金"
      - "逾期"
      - "迟延"
      - "延迟"
      - "单方解除"
      - "解除合同"
      - "终止合同"
      - "根本违约"
      - "严重违约"
      - "赔偿全部损失"
      - "有权单方解除"
    keywords:
      - "滞纳金"
      - "违约"
      - "每日.*%"
      - "按日.*%"
      - "承担.*赔偿"
      - "赔偿.*万元"
      - "返还全部"
      - "补救措施"
      - "继续履行"
      - "拒收"
      - "退货"
      - "更换"
    # 关键排除规则：非违约场景不匹配违约责任（防止过度匹配）
    # 大幅扩充排除关键词，覆盖标的相关、表格相关、履行相关的所有关键词
    exclude_keywords:
      # 金额/价格相关
      - "合同金额"
      - "合同总价"
      - "总价"
      - "人民币"
      - "元整"
      - "大写金额"
      - "小写金额"
      - "含税"
      - "不含税"
      - "税率"
      - "价款"
      - "费用"
      # 付款/支付相关
      - "付款方式"
      - "支付方式"
      - "预付款"
      - "首付款"
      - "尾款"
      - "银行转账"
      - "到账"
      - "发票"
      # 标的/产品相关
      - "标的"
      - "货物"
      - "产品名称"
      - "服务内容"
      - "采购内容"
      - "供货范围"
      - "采购标的"
      - "技术规格"
      - "设备清单"
      - "配置清单"
      - "规格"
      - "型号"
      - "品牌"
      - "数量"
      - "技术要求"
      - "技术标准"
      - "质量标准"
      - "质量要求"
      - "设备"
      - "电脑"
      - "手机"
      - "服务器"
      - "终端"
      - "软件"
      - "授权"
      - "维保"
      - "保修"
      - "定制版"
      - "内存"
      - "硬盘"
      - "CPU"
      - "固态硬盘"
      - "配置参数"
      - "技术参数"
      - "参数表"
      # 履行/交付相关
      - "交付"
      - "交货"
      - "到货"
      - "验收"
      - "验收标准"
      - "验收合格"
      - "交付时间"
      - "交付地点"
      - "交货地点"
      - "交付方式"
      - "交货期"
      - "工期"
      - "进度"
      - "安装"
      - "调试"
      - "部署"
      - "上线"
      - "培训"
      - "包装"
      - "运输"
      - "货运"
      - "物流"
      - "风险转移"
      - "所有权转移"
      # 表格相关
      - "[表格1]"
      - "[表格2]"
      - "[表格3]"
      - "[表格4]"
      - "[表格5]"
      # 主体信息相关
      - "甲方（"
      - "乙方（"
      - "甲方："
      - "乙方："
      - "需方（"
      - "供方（"
      - "买方（"
      - "卖方（"
      - "委托方（"
      - "受托方（"
      - "统一社会信用代码"
      - "法定代表人"
      - "有限公司"
      - "股份公司"
      - "地址"
      - "住所地"
      - "联系电话"
      - "邮箱"
      - "联系人"

  # ==========================================
  # 08. 争议解决条款
  # ==========================================
  - code: "08"
    name: "争议解决"
    legal_basis: "《民法典》第507条，争议解决条款效力"
    priority: 8
    core_features:
      - "争议"
      - "纠纷"
      - "争议解决"
      - "管辖"
      - "法院"
      - "人民法院"
      - "仲裁"
      - "仲裁委员会"
      - "诉讼"
      - "起诉"
      - "上诉"
      - "向.*法院起诉"
      - "向.*仲裁委申请"
    keywords:
      - "协商解决"
      - "调解"
    exclude_keywords: []

  # ==========================================
  # 09. 保密与知识产权条款
  # ==========================================
  - code: "09"
    name: "保密与知识产权"
    legal_basis: "《民法典》第501条、第844条及以后"
    priority: 6
    core_features:
      - "保密"
      - "保密义务"
      - "保密责任"
      - "保密信息"
      - "商业秘密"
      - "技术秘密"
      - "保密期限"
      - "解密"
      - "知识产权"
      - "著作权"
      - "版权"
      - "专利权"
      - "商标"
      - "归属"
      - "所有"
      - "许可"
      - "授权"
    keywords:
      - "不得泄露"
      - "不得披露"
      - "永久保密"
    exclude_keywords: []

  # ==========================================
  # 10. 其他条款
  # ==========================================
  - code: "10"
    name: "其他条款"
    priority: 1
    core_features:
      - "不可抗力"
      - "免责"
      - "免责条款"
      - "通知"
      - "送达"
      - "变更"
      - "修改"
      - "补充"
      - "生效"
      - "生效条件"
      - "生效日期"
      - "附件"
      - "附录"
      - "附表"
      - "附图"
      - "未尽事宜"
      - "一式.*份"
      - "本合同一式"
      - "法律适用"
      - "适用法律"
      - "中华人民共和国法律"
    keywords: []
    exclude_keywords: []

# ==========================================
# 默认分类
# ==========================================
default_category:
  code: "99"
  name: "待分类"
